      chips.forEach(c=>{
        sugHTML+=`<span class="lschip">
              <button class="lastset ${c.now?'now':''}" data-rep-w="${c.w}" data-rep-r="${c.r}">
                <span class="ls-w">${isBody(ex)&&c.w<=0.01?'BW':`${wDisp(c.w)}<small>${U()}</small>`}</span>
                <span class="ls-x">×</span>
                <span class="ls-r">${c.r}</span></button>
              <button class="lsx" data-sugx="${c.key}" aria-label="Dismiss">✕</button>
            </span>`;
      });
      sugHTML+=`</div>`;
      if(!mini) sugHTML+=`<div class="row" style="gap:8px;margin-top:10px">
            <button class="btn ghost" id="repeatAll" style="margin:0">Log all ${chips.length}</button>
            <button class="btn ghost" id="copySets" style="margin:0">Copy suggestion →</button>
          </div>`;
      sugHTML+=`</div>`;
    }
  }

  if(isRun){
    h+=`<div class="zone prime"><div class="zonehead"><span>Log a run</span></div>
        <div class="runrow" style="margin:10px 0">
          <div class="fld"><label>Distance ${DU()}</label><input id="rk" type="number" inputmode="decimal" step="0.01" placeholder="0.00"></div>
          <div class="fld"><label>Min</label><input id="rm" type="number" inputmode="numeric" placeholder="0"></div>
          <div class="fld"><label>Sec</label><input id="rs" type="number" inputmode="numeric" placeholder="0"></div>
        </div><button class="btn" id="addrun">Add run</button></div>`;
  }else{
    if(lift.weight===0||lift.weight==null){
      const savedW=(DB.settings.exW||{})[ex];
      if(savedW!=null) lift.weight=savedW;                     // your default, exactly as you set it
      else if(isBody(ex)) lift.weight=DB.settings.bodyKg||0;   // your bodyweight (Settings), else BW=0
      else{
        const top=ls&&ls.sets.length?Math.max(...ls.sets.map(s=>s.w)):null;
        lift.weight=top!=null?snapW(top):toKg(isLb()?45:20);   // inferred weights snap to clean steps
      }
    }
    h+=`<div class="zone prime"><div class="zonehead"><span>Log a set</span></div>
        <div class="wsel" style="margin-top:10px"><button data-w="-1">−</button>
        <div class="val"><input id="wv" type="number" inputmode="decimal" step="${STEP()}" value="${wDisp(lift.weight)}"><span class="unit">${U()}</span></div>
        <button data-w="1">+</button></div>`;
    if(usesPlates(ex)){
      h+=`<div class="loadline" id="ll">${loadInner(ex,lift.weight)}</div>`;
    }else if(loadLine(ex,lift.weight)){
      h+=`<div class="loadline" id="ll"><span class="ll-text">${loadLine(ex,lift.weight)}</span></div>`;
    }
    // rep buttons drawn from what you actually do for THIS exercise
    const reps=repChoices(ex);
    h+=`<div class="repgrid">${reps.map(r=>`<button data-rep="${r}">${r}</button>`).join('')}</div>
        <div class="repcustom">
          <input id="rc" type="number" inputmode="numeric" placeholder="reps">
          <button class="btn" id="addrep" style="margin:0;flex:0 0 96px">Add set</button>
        </div></div>`;
  }

  // the nudge sits directly under the stepper it's about to change
  if(!isRun){
    const nud=overloadNudge(ex);
    if(nud&&nud.mode==='reps') h+=`<div class="nudge">
        <span>Same <b>${nud.topR} reps</b> for <b>${nud.n}</b> sessions — one more?</span>
        <button class="btn ghost nudgego" id="nudgeGo" data-nr="${nud.nextR}">${nud.nextR} reps →</button>
        <button class="lsx nudgex" data-nudgex="r${nud.topR}" aria-label="Dismiss">✕</button>
      </div>`;
    else if(nud) h+=`<div class="nudge">
        <span>Same <b>${wDisp(nud.top)} ${U()}</b> for <b>${nud.n}</b> sessions — try ${wDisp(nud.next)}?</span>
        <button class="btn ghost nudgego" id="nudgeGo" data-nw="${nud.next}">${wDisp(nud.next)} ${U()} →</button>
        <button class="lsx nudgex" data-nudgex="${nud.top}" aria-label="Dismiss">✕</button>
      </div>`;
  }

  h+=sugHTML;

  if(todaySets.length){
    h+=`<div class="zone"><div class="zonehead"><span>Logged today · <b class="hi">${todaySets.length}</b> sets</span></div>`;
  }
  h+=`<div class="sets">`;
  todaySets.forEach((s,ti)=>{
    const idx=t.w.indexOf(s);
    const isPR=!isRun&&s.reps.length&&s.w>=p.mw;
    const fresh=lift.justSaved&&ti===todaySets.length-1;
    const anim=fresh?(isPR?' savedpr':' saved'):'';
    h+=isRun
      ?`<div class="settile${anim}${lift.editSet===idx?' editing':''}" data-del="${idx}"><span class="w">${dDisp(s.w)} ${DU()}</span><span class="x">${s.mins||0}'${String(s.secs||0).padStart(2,'0')}"</span></div>`
      :`<div class="settile ${isPR?'pr':''}${anim}${lift.editSet===idx?' editing':''}" data-del="${idx}"><span class="w">${wLabel(ex,s.w)}</span><span class="x">${isBody(ex)&&s.w<=0.01?'×':U()+' ×'}</span><span class="w">${s.reps[0]}</span></div>`;
  });
  lift.justSaved=false;
  h+=`</div>`;
  if(todaySets.length){
    h+=`<div class="row" style="gap:8px;margin-top:10px">
          <button class="btn ghost" id="clearToday" style="margin:0;flex:1;white-space:nowrap;padding:12px 6px">Clear today's ${todaySets.length}</button>
          <button class="btn ghost" id="moveToday" style="margin:0;flex:1;white-space:nowrap;padding:12px 6px">Move to another lift →</button>
        </div>
        ${undoStack.length?`<button class="btn ghost" id="undoBtn" style="margin-top:8px">↺ Undo — ${undoStack[undoStack.length-1].label}</button>`:''}`;
    if(isRun){
      const km=todaySets.reduce((a,s)=>a+s.w,0);
      const sec=todaySets.reduce((a,s)=>a+(s.mins||0)*60+(s.secs||0),0);
      const pace=km?sec/toD(km):0;
      h+=`<div class="tot"><span>Today <b>${dDisp(km)} ${DU()}</b></span>
          <span>pace <b>${Math.floor(pace/60)}'${String(Math.round(pace%60)).padStart(2,'0')}"</b>/${DU()}</span></div>`;
    }else{
      const v=todaySets.reduce((a,s)=>a+volOf(s),0);
      const lastVol=ls?ls.sets.reduce((a,s)=>a+s.w*s.r,0):0;
      const d=lastVol?Math.round((v/lastVol-1)*100):0;
      h+=`<div class="tot"><span>Volume <b>${vDisp(v)} ${U()}</b> · ${todaySets.length} sets</span>
          ${lastVol?`<span class="delta ${d>=0?'up':'down'}">${d>=0?'+':''}${d}% vs ${wd(ls.d)}</span>`:''}</div>`;
    }
    const es=(lift.editSet!=null)?t.w[lift.editSet]:null;
    if(es&&es.ex===ex){
      h+=isRun
        ?`<div class="card editcard" style="margin-top:10px">
            <div class="mono muted" style="font-size:11px;margin-bottom:8px">EDIT RUN</div>
            <div class="row" style="gap:8px">
              <div class="fld"><label>Distance ${DU()}</label><input id="edW" type="number" inputmode="decimal" step="0.01" value="${dDisp(es.w)}"></div>
              <div class="fld"><label>Min</label><input id="edM" type="number" inputmode="numeric" value="${es.mins||0}"></div>
              <div class="fld"><label>Sec</label><input id="edS" type="number" inputmode="numeric" value="${es.secs||0}"></div>
            </div>
            <div class="row" style="gap:8px;margin-top:10px">
              <button class="btn" id="editSave" style="margin:0">Save</button>
              <button class="btn ghost" id="editCancel" style="margin:0;flex:0 0 96px">Cancel</button>
            </div></div>`
        :`<div class="card editcard" style="margin-top:10px">
            <div class="mono muted" style="font-size:11px;margin-bottom:8px">EDIT SET</div>
            <div class="row" style="gap:8px">
              <div class="fld"><label>Weight ${U()}</label><input id="edW" type="number" inputmode="decimal" step="${STEP()}" value="${wDisp(es.w)}"></div>
              <div class="fld"><label>Reps</label><input id="edR" type="text" inputmode="numeric" value="${es.reps.join(',')}"></div>
            </div>
            <div class="row" style="gap:8px;margin-top:10px">
              <button class="btn" id="editSave" style="margin:0">Save</button>
              <button class="btn ghost" id="editCancel" style="margin:0;flex:0 0 96px">Cancel</button>
            </div></div>`;
    }
    h+=`<div class="note">Tap a set to delete it — <b>hold to edit</b>. Undo is one tap away.</div></div>`;
  }else if(undoStack.length){
    h+=`<button class="btn ghost" id="undoBtn" style="margin-top:12px">↺ Undo — ${undoStack[undoStack.length-1].label}</button>`;
  }
  if(!isRun) h+=progChart(ex);
  if(exOpen(ex)) h+=`<button class="btn done" id="doneExBtn">✓ Complete ${ex}</button>`;
  h+=prFoot;
  $('#view').innerHTML=h;
}

/* The session this exercise was last done in — strictly BEFORE today.
   Today's logging never rewrites it, so it stays a stable template you can
   copy from, repeat, or compare against. */
function lastSession(ex){
  const mine=Object.entries(DB.days)
    .filter(([d,v])=>d<todayISO && v.w.some(s=>s.ex===ex))
    .sort((a,b)=>b[0].localeCompare(a[0]))[0];
  const seed=SEED.lastSess[ex];
  const useMine = mine && (!seed || mine[0]>seed.d);
  if(useMine){
    const sets=[];
    mine[1].w.filter(s=>s.ex===ex).forEach(s=>s.reps.forEach(r=>sets.push({w:s.w,r})));
    return {d:mine[0], sets};
  }
  if(!seed || seed.d>=todayISO) return null;
  const sets=[];
  seed.rows.forEach(([w,rs])=>rs.forEach(r=>sets.push({w,r})));
  return {d:seed.d, sets};
}
/* rep buttons: the rep counts you actually use for this lift, plus today's */
function repChoices(ex){
  const c={};
  (SEED.repFreq[ex]||[]).forEach((r,i)=>c[r]=(c[r]||0)+(8-i));
  for(const [,v] of Object.entries(DB.days))
    for(const s of v.w) if(s.ex===ex) s.reps.forEach(r=>c[r]=(c[r]||0)+3);
  let list=Object.keys(c).map(Number).sort((a,b)=>c[b]-c[a]).slice(0,12);
  if(list.length<6) list=[...new Set([...list,5,6,8,10,12,15])].slice(0,12);
  return list.sort((a,b)=>a-b);
}
/* load line inner: fixed-width bar picture so the text never shifts */
function loadInner(ex,kg){
  if(lift.editBar){
    return `<span class="ll-text" style="flex:1">
              <label class="mono" style="font-size:10px;color:var(--muted);display:block;margin-bottom:4px">Bar weight for ${ex} (${U()})</label>
              <input id="barIn" type="number" inputmode="decimal" step="0.5" value="${wDisp(barKg(ex))}" class="barinput">
            </span>
            <button class="ll-bar save" data-savebar="${ex}">This lift</button>
            <button class="ll-bar save" data-savebarall="${ex}">All ${equipOf(ex)==='smith'?'Smith':'barbell'}</button>
            <button class="ll-bar" data-cancelbar="1">Cancel</button>`;
  }
  return `<span class="ll-viz">${barViz(ex,kg)}</span><span class="ll-text">${loadLine(ex,kg)}</span>
          <button class="ll-bar" data-editbar="${ex}">bar<br><b>${wDisp(barKg(ex))}${U()}</b> ✎</button>`;
}


/* ---------- Run ----------------------------------------------------------
   Distance is stored in km (the sheet's "KM Ran" column); mins/secs are the
   clock. Only ~825 of the runs ever got a time written down, so pace is
   computed from the timed distance alone — an untimed run adds km but never
   drags the pace. */
function runDays(){
  const m={};
  const add=(d,km,mins,secs)=>{
    const e=m[d]||(m[d]={km:0,sec:0,timed:0});
    const s=(mins||0)*60+(secs||0);
    e.km+=km||0;
    if(s>0){ e.sec+=s; e.timed+=km||0; }
  };
  for(const [d,list] of Object.entries(SEED.sessions))
    for(const r of list) if(r[1]==='Run') add(d,r[2],r[4],r[5]);
  for(const [d,v] of Object.entries(DB.days)){
    if(d<=SEED.totals.last) continue;                 // seed already has it
    for(const s of v.w) if(s.ex==='Run') add(d,s.w,s.mins,s.secs);
  }
  return Object.entries(m).filter(([,e])=>e.km>0)
    .sort((a,b)=>a[0].localeCompare(b[0]))
    .map(([d,e])=>({d,km:e.km,sec:e.sec,timed:e.timed}));
}
const paceStr=s=>s>0?`${Math.floor(s/60)}'${String(Math.round(s%60)).padStart(2,'0')}"`:'—';
const paceOf=r=>r.timed>0?r.sec/toD(r.timed):0;      // seconds per displayed unit
function runStreak(days){
  const s=new Set(days.map(r=>r.d));
  let n=0, d=new Date(todayISO+'T00:00');
  if(!s.has(todayISO)) d.setDate(d.getDate()-1);      // today may simply not have happened
  while(s.has(d.toLocaleDateString('en-CA'))){n++;d.setDate(d.getDate()-1);}
  return n;
}
const weekOf=iso=>{const [y,m,dd]=iso.split('-').map(Number);
  const dt=new Date(y,m-1,dd); dt.setDate(dt.getDate()-dt.getDay());   // Sunday start, like the sheet
  return dt.toLocaleDateString('en-CA');};
const weekNum=sunISO=>Math.ceil(doy(sunISO)/7);                        // the sheet's Week Num

function runStatsHTML(){
  const days=runDays();
  if(!days.length) return '';
  const totalKm=days.reduce((a,r)=>a+r.km,0);
  const total=toD(totalKm);
  const ytd=days.filter(r=>r.d.startsWith(thisYear)).reduce((a,r)=>a+toD(r.km),0);
  const streak=runStreak(days);

  let h=`<h2 id="secRun">Run</h2>
    <div class="kpis">
      <div class="kpi accent"><div class="v">${fmt(Math.round(total))}</div><div class="l">${DU()}, all time</div>
        <div class="d mono">${days.length} runs since ${md(days[0].d)}</div></div>
      <div class="kpi accent"><div class="v">${streak}</div><div class="l">day run streak</div></div>
      <div class="kpi"><div class="v">${Math.round(ytd)}</div><div class="l">${DU()} in ${thisYear}</div></div>
    </div>`;

  /* --- next milestone: every 100 km (or 100 mi), with an honest ETA --- */
  const STEP_M=100;
  const next=(Math.floor(total/STEP_M)+1)*STEP_M, prev=next-STEP_M, left=next-total;
  const recent=days.filter(r=>daysAgo(r.d)<=28);
  const recSum=recent.reduce((a,r)=>a+toD(r.km),0);
  const rate=recSum/28;                                       // per calendar day, last 4 weeks
  const avgRun=recent.length?recSum/recent.length:total/days.length;
  const etaDays=rate>0?Math.ceil(left/rate):null;
  const eta=etaDays!=null?(()=>{const d=new Date(todayISO+'T00:00');d.setDate(d.getDate()+etaDays);
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});})():null;
  h+=`<h2>Next milestone</h2><div class="card">
      <div class="mstone"><span class="big">${left.toFixed(1)} ${DU()}</span>
        <span class="goal">to ${fmt(next)}</span></div>
      <div class="mbar"><i style="width:${Math.max(2,Math.min(100,(total-prev)/STEP_M*100)).toFixed(1)}%"></i></div>
      <div class="tot"><span><b>${Math.ceil(left/avgRun)}</b> runs at your recent ${avgRun.toFixed(2)} ${DU()}</span>
        ${eta?`<span>on this pace · <b>${eta}</b></span>`:''}</div>
      <div class="note">Last 4 weeks: ${recSum.toFixed(1)} ${DU()} over ${recent.length} runs.</div></div>`;

  /* ---- this year: declared goal, honest pace ---- */
  {
    const doyNow=doy(todayISO), yLen=(+thisYear%4===0)?366:365;
    const projected=ytd/doyNow*yLen;
    const goal=(DB.settings.kmGoal||{})[thisYear];
    if(goal){
      const shouldBe=goal*doyNow/yLen;
      const ahead=ytd-shouldBe;
      const pct=Math.min(100,ytd/goal*100);
      h+=`<h2>${thisYear} goal</h2><div class="card">
        <div class="mstone"><span class="big">${Math.round(ytd)}</span>
          <span class="goal">of ${fmt(goal)} ${DU()}</span></div>
        <div class="mbar"><i style="width:${Math.max(2,pct).toFixed(1)}%"></i>
          <b class="pacemark" style="left:${(doyNow/yLen*100).toFixed(1)}%"></b></div>
        <div class="tot">
          <span class="${ahead>=0?'up':'down'}"><b>${ahead>=0?'+':''}${Math.round(ahead)} ${DU()}</b> ${ahead>=0?'ahead of':'behind'} pace</span>
          <span>projecting <b>${Math.round(projected)}</b></span></div>
        <div class="note">The tick marks where you should be today. <button class="linky" id="goalEdit">Change goal</button></div>
      </div>`;
    }else{
      const lastYr=days.filter(r=>r.d.startsWith(String(+thisYear-1)))
                       .reduce((a,r)=>a+toD(r.km),0);          // yTot isn't built yet here
      const suggest=Math.round((lastYr||projected||300)/50)*50+50;
      h+=`<h2>${thisYear} goal</h2><div class="card">
        <div class="note" style="margin:0 0 10px">No goal set. You're projecting <b>${Math.round(projected)} ${DU()}</b> this year at your current rate.</div>
        <button class="btn ghost" id="goalSet" data-suggest="${suggest}" style="margin:0">Set a ${thisYear} goal →</button>
      </div>`;
    }
  }

  /* --- weekly distance, last 16 weeks --- */
  const wkBy={};
  for(const r of days) wkBy[weekOf(r.d)]=(wkBy[weekOf(r.d)]||0)+toD(r.km);
  const thisWk=weekOf(todayISO);
  const wks=Object.keys(wkBy).sort().slice(-16);
  if(!wks.includes(thisWk)) wks.push(thisWk);
  const wkMax=Math.max(...wks.map(w=>wkBy[w]||0),1);
  const wkAvg=wks.filter(w=>w!==thisWk).reduce((a,w)=>a+(wkBy[w]||0),0)/Math.max(1,wks.length-1);
  h+=`<h2>Every week</h2><div class="card">
      <div class="zoom" data-zoom><svg viewBox="0 0 330 118" style="width:100%;height:auto">`;
  if(wkAvg){
    const ay=94-wkAvg/wkMax*80;
    h+=`<line x1="8" y1="${ay.toFixed(1)}" x2="316" y2="${ay.toFixed(1)}" stroke="var(--line)" stroke-width="0.6" stroke-dasharray="2 3"></line>
        <text x="319" y="${(ay+2.5).toFixed(1)}" font-family="var(--mono)" font-size="7" fill="var(--muted)">${Math.round(wkAvg)}</text>`;
  }
  const bw=Math.min(17,(300/wks.length)-2), gap=300/wks.length;
  wks.forEach((w,i)=>{
    const cur=w===thisWk, v=wkBy[w]||0;
    const bh=Math.max(2,v/wkMax*80), x=8+i*gap;
    h+=`<rect class="gbar" x="${x.toFixed(1)}" y="${(94-bh).toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="3" fill="var(--accent)" opacity="${cur?1:.55}"></rect>
        <text x="${(x+bw/2).toFixed(1)}" y="${(91-bh).toFixed(1)}" text-anchor="middle" font-family="var(--mono)" font-size="6.5" fill="var(--muted)">${Math.round(v)}</text>
        <text x="${(x+bw/2).toFixed(1)}" y="107" text-anchor="middle" font-family="var(--mono)" font-size="6.5" fill="${cur?'var(--accent)':'var(--muted)'}">${weekNum(w)}</text>`;
  });
  h+=`</svg></div><div class="tot"><span><b>${(wkBy[thisWk]||0).toFixed(1)} ${DU()}</b> this week (wk ${weekNum(thisWk)})</span>
      <span>16-week avg ${wkAvg.toFixed(1)} ${DU()}</span></div></div>`;

  /* --- year over year, cumulative distance --- */
  const yc={};
  for(const r of days){const y=r.d.slice(0,4); (yc[y]=yc[y]||[]).push([doy(r.d),toD(r.km)]);}
  const years=Object.keys(yc).filter(y=>y>='2022').sort();
  const yTot={}; for(const y of years) yTot[y]=yc[y].reduce((a,p)=>a+p[1],0);
  const dataMax=Math.max(...Object.values(yTot),1);
  const step=Math.max(10,Math.round(dataMax/4/10)*10);        // 361 -> 90, 180, 270, 360
  const yMax=Math.max(dataMax,step*4);
  h+=`<h2>Year over year</h2><div class="card">
      <div class="zoom" data-zoom><div class="zoomhint">pinch / scroll to zoom · double-tap to reset</div>
      <svg viewBox="0 0 340 170" style="width:100%;height:auto">`;
  for(let g=0;g<=4;g++){
    const y=140-(g*step)/yMax*120;
    h+=`<line x1="30" y1="${y.toFixed(1)}" x2="300" y2="${y.toFixed(1)}" stroke="var(--line)" stroke-width="0.6" ${g?'stroke-dasharray="2 3"':''}></line>
        <text x="26" y="${(y+3).toFixed(1)}" text-anchor="end" font-family="var(--mono)" font-size="7" fill="var(--muted)">${g===4?`${g*step}${DU()}`:g*step}</text>`;
  }
  ['J','F','M','A','M','J','J','A','S','O','N','D'].forEach((m,i)=>{
    const x=30+((i*30.4+15)/366)*270;
    h+=`<text x="${x.toFixed(1)}" y="152" text-anchor="middle" font-family="var(--mono)" font-size="7" fill="var(--muted)">${m}</text>`;
  });
  const labels=[];
  for(const y of years){
    const pts=yc[y].sort((a,b)=>a[0]-b[0]);
    let c=0, path='';
    const end = y===thisYear ? doy(todayISO) : ((+y%4===0)?366:365);
    let i=0;
    for(let d=1;d<=end;d++){
      while(i<pts.length&&pts[i][0]<=d){c+=pts[i][1];i++;}
      if(d===1||d===end||d%3===0) path+=`${(30+(d/366)*270).toFixed(1)},${(140-c/yMax*120).toFixed(1)} `;
    }
    const cur=y===thisYear;
    const lx=30+(end/366)*270, ly=140-c/yMax*120;
    h+=`<polyline points="${path.trim()}" fill="none" stroke="${YEAR_COLORS[y]||'var(--muted)'}" stroke-width="${cur?2:1.2}" stroke-linejoin="round"></polyline>`;
    if(cur) h+=`<circle class="beacon" cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="3.2" fill="var(--accent)"></circle>`;
    labels.push({y,lx,ly,cur});
  }
  // year tags sit at their line's end; nudge apart if two totals nearly tie (303 vs 305)
  labels.sort((a,b)=>a.ly-b.ly);
  for(let i=1;i<labels.length;i++)
    if(labels[i].ly-labels[i-1].ly<8) labels[i].ly=labels[i-1].ly+8;
  for(const L of labels)
    h+=`<text x="${Math.min(L.lx+(L.cur?6:4),316).toFixed(1)}" y="${(L.ly+2.5).toFixed(1)}" font-family="var(--mono)" font-size="7.5"
         fill="${YEAR_COLORS[L.y]||'var(--muted)'}" font-weight="${L.cur?700:400}">${L.y.slice(2)}</text>`;
  h+=`</svg></div><div class="legend1">`;
  for(const y of years) h+=`<span><i style="background:${YEAR_COLORS[y]||'var(--muted)'}"></i>${y} · ${Math.round(yTot[y])}</span>`;
  h+=`</div><div class="note">Cumulative ${DU()} by day of year. ${thisYear} is still running.</div></div>`;

  /* --- pace, by month (timed runs only; lower is faster) --- */
  const pm={};
  for(const r of days){ if(r.timed<=0) continue;
    const k=r.d.slice(0,7); const e=pm[k]||(pm[k]={sec:0,d:0}); e.sec+=r.sec; e.d+=toD(r.timed); }
  const pms=Object.entries(pm).sort().slice(-12);
  if(pms.length){
    const paces=pms.map(([m,e])=>[m,e.sec/e.d]);
    const lo=Math.min(...paces.map(p=>p[1])), hi=Math.max(...paces.map(p=>p[1]));
    const span=Math.max(hi-lo,30);                     // never flatten a near-identical year
    const base=lo-span*0.25, top=hi+span*0.25;
    h+=`<h2>Pace, by month</h2><div class="card">
        <div class="zoom" data-zoom><svg viewBox="0 0 330 118" style="width:100%;height:auto">`;
    let poly='';
    paces.forEach(([m,p],i)=>{
      const x=14+i*(302/Math.max(1,paces.length-1||1)), y=14+(top-p)/(top-base)*80;
      const latest=i===paces.length-1, fastest=p===lo&&!latest;
      const col=latest?'var(--accent)':fastest?'var(--record)':'var(--accent)';
      poly+=`${x.toFixed(1)},${y.toFixed(1)} `;
      h+=`<circle ${latest?'class="beacon"':''} cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${latest?3.2:fastest?3:2}" fill="${col}"></circle>
          <text x="${x.toFixed(1)}" y="${(y-6).toFixed(1)}" text-anchor="middle" font-family="var(--mono)" font-size="6.5" font-weight="${latest?700:400}" fill="${latest?'var(--accent)':fastest?'var(--record)':'var(--muted)'}">${paceStr(p)}</text>
          <text x="${x.toFixed(1)}" y="107" text-anchor="middle" font-family="var(--mono)" font-size="6.5" fill="${latest?'var(--accent)':'var(--muted)'}">${m.slice(5)}</text>`;
    });
    h+=`<polyline points="${poly.trim()}" fill="none" stroke="var(--accent)" stroke-width="1.2" stroke-linejoin="round"></polyline>
        </svg></div><div class="note">Minutes per ${DU()}, timed runs only — faster months sit lower. Fastest in red, this month in blue.</div></div>`;
  }

  /* --- records --- */
  const long=days.reduce((a,r)=>toD(r.km)>toD(a.km)?r:a);
  const fast=days.filter(r=>r.timed>=1).sort((a,b)=>paceOf(a)-paceOf(b))[0];
  const mo={}; for(const r of days) mo[r.d.slice(0,7)]=(mo[r.d.slice(0,7)]||0)+toD(r.km);
  const bestMo=Object.entries(mo).sort((a,b)=>b[1]-a[1])[0];
  const bestWk=Object.entries(wkBy).sort((a,b)=>b[1]-a[1])[0];
  h+=`<h2>Records</h2><table class="rec-core">
      <tr><th>Longest run</th><td class="n"><b>${dDisp(long.km)} ${DU()}</b><span class="recdate">${md(long.d)}</span></td></tr>
      ${fast?`<tr><th>Fastest pace</th><td class="n"><b>${paceStr(paceOf(fast))} /${DU()}</b><span class="recdate">${md(fast.d)}</span></td></tr>`:''}
      <tr><th>Biggest week</th><td class="n"><b>${bestWk[1].toFixed(1)} ${DU()}</b><span class="recdate">week of ${md(bestWk[0])}</span></td></tr>
      <tr><th>Biggest month</th><td class="n"><b>${Math.round(bestMo[1])} ${DU()}</b><span class="recdate">${bestMo[0]}</span></td></tr>
      </table>`;
  return h;
}

/* ---------- Stats: days first ---------- */
const YEAR_COLORS={ '2022':'var(--faint)','2023':'var(--muted)','2024':'var(--accent-dim)','2025':'var(--accent-soft)','2026':'var(--accent)' };
function renderStats(){
  const dates=workoutDates();
  const curves=yearCurves();
  const monthKey=todayISO.slice(0,7);

  // monthly workout-day counts (seed monthly + user days)
  const mdays={};
  for(const [m,v] of Object.entries(SEED.monthly)) mdays[m]=new Set();
  for(const d of dates){const m=d.slice(0,7);(mdays[m]=mdays[m]||new Set()).add(d);}
  const monthCounts=Object.fromEntries(Object.entries(mdays).map(([m,s])=>[m,s.size||((SEED.monthly[m]||{}).days||0)]));
  // seed monthly.days already correct pre-app; the dates set covers everything, so:
  for(const [m,v] of Object.entries(SEED.monthly)) monthCounts[m]=Math.max(monthCounts[m]||0,v.days);

  const thisYearDays=[...dates].filter(d=>d.startsWith(thisYear)).length;
  const elapsed=doy(todayISO);
  const consNow=thisYearDays/elapsed;
  const lastYear=String(+thisYear-1);
  const lyCurve=curves[lastYear];
  const lyAtSamePoint=lyCurve?lyCurve.curve[Math.min(elapsed,lyCurve.end)-1]:null;
  const diff=lyAtSamePoint!=null?Math.round((consNow-lyAtSamePoint)*100):null;

  let h=`<div class="jumps">
      <button data-jump="secDays">Days</button>
      <button data-jump="secParts">Parts</button>
      <button data-jump="secRun">Run</button>
      <button data-jump="secRecords">Records</button>
    </div>
    <h2 id="secDays">Show up — that's the whole game</h2>
    <div class="kpis">
      <div class="kpi accent"><div class="v">${Math.round(consNow*100)}%</div><div class="l">of ${thisYear}, trained</div>
        ${diff!=null?`<div class="d ${diff>=0?'delta up':'delta down'}">${diff>=0?'+':''}${diff} pts vs ${lastYear} today</div>`:''}</div>
      <div class="kpi accent"><div class="v">${currentStreak()}</div><div class="l">day streak · best ${longestStreak()}</div></div>
      ${(()=>{
        const dNow=+todayISO.slice(8);
        const cur=(monthCounts[monthKey]||0)/dNow;
        const pv=new Date(+thisYear,+monthKey.slice(5)-1,0);            // last day of prev month
        const pKey=pv.toLocaleDateString('en-CA').slice(0,7);
        const pN=Math.min(dNow,pv.getDate());
        let pDays=0;
        for(let d2=1;d2<=pN;d2++) if(dates.has(`${pKey}-${String(d2).padStart(2,'0')}`)) pDays++;
        const diff=Math.round((cur-pDays/pN)*100);
        const pName=pv.toLocaleDateString('en-US',{month:'short'});
        return `<div class="kpi"><div class="v">${Math.round(cur*100)}%</div>
          <div class="l">of ${new Date(+thisYear,+monthKey.slice(5)-1,1).toLocaleDateString('en-US',{month:'long'})}, trained</div>
          <div class="d mono" style="color:${diff>=0?'var(--accent)':'var(--record)'}">${diff>=0?'+':''}${diff} pts vs ${pName} (day ${pN})</div></div>`;
      })()}
    </div>`;

  // consistency chart — the Dashboard bottom graph
  h+=`<h2>Consistency, year over year</h2><div class="card">
      <div class="zoom" data-zoom><div class="zoomhint">pinch / scroll to zoom · double-tap to reset</div>
      <svg viewBox="0 0 340 170" style="width:100%;height:auto">`;
  // y grid + labels
  for(const g of [0,0.25,0.5,0.75,1]){
    const y=140-g*120;
    h+=`<line x1="26" y1="${y}" x2="300" y2="${y}" stroke="var(--line)" stroke-width="0.6" ${g?'stroke-dasharray="2 3"':''}></line>
        <text x="22" y="${y+3}" text-anchor="end" font-family="var(--mono)" font-size="7" fill="var(--muted)">${g*100}%</text>`;
  }
  // x months
  ['J','F','M','A','M','J','J','A','S','O','N','D'].forEach((m,i)=>{
    const x=26+((i*30.4+15)/366)*274;
    h+=`<line x1="${x}" y1="140" x2="${x}" y2="143" stroke="var(--line)" stroke-width="0.6"></line>
        <text x="${x}" y="152" text-anchor="middle" font-family="var(--mono)" font-size="7" fill="var(--muted)">${m}</text>`;
  });
  const years=Object.keys(curves).filter(y=>y>='2022').sort();
  for(const y of years){
    const {curve,end}=curves[y];
    let pts='';
    for(let d=0;d<end;d+=2){
      const x=26+(d/366)*274, yy=140-curve[d]*120;
      pts+=`${x.toFixed(1)},${yy.toFixed(1)} `;
    }
    const cur=y===thisYear;
    h+=`<polyline points="${pts}" fill="none" stroke="${YEAR_COLORS[y]||'var(--muted)'}"
         stroke-width="${cur?2.2:1.1}" opacity="${cur?1:.7}" stroke-linejoin="round"></polyline>`;
    // end-of-line % label
    const lx=26+((end-1)/366)*274, ly2=140-curve[end-1]*120;
    h+=`<text x="${Math.min(lx+4,312)}" y="${ly2+2.5}" font-family="var(--mono)" font-size="7"
          fill="${YEAR_COLORS[y]||'var(--muted)'}" font-weight="${cur?700:400}">${Math.round(curve[end-1]*100)}%</text>`;
    if(cur) h+=`<circle class="beacon" cx="${lx}" cy="${ly2}" r="3.2" fill="var(--accent)"></circle>`;
  }
  h+=`</svg></div><div class="legend1">`;
  for(const y of years){
    const c=curves[y], cur=y===thisYear;
    h+=`<span class="${cur?'cur':''}"><i style="background:${YEAR_COLORS[y]}"></i>${y}<b>${Math.round(c.curve[c.end-1]*100)}%</b></span>`;
  }
  h+=`</div><div class="note">% of days trained, cumulative through each year</div></div>`;

  // heatmap: 26 weeks, weekday rail on the left, months across the top
  const detail=allDays();
  h+=`<h2>Last 6 months</h2><div class="card"><div class="heatwrap">
        <div class="wdrail">${['S','M','T','W','T','F','S'].map(d=>`<span>${d}</span>`).join('')}</div>
        <div class="heatcols"><div class="heatscroll">`;
  const start2=new Date(todayISO+'T00:00');
  start2.setDate(start2.getDate()-start2.getDay()-25*7);
  let mrow='', grid='', lastM=-1;
  for(let w=0;w<26;w++){
    const first=new Date(start2); first.setDate(start2.getDate()+w*7);
    const m=first.getMonth();
    mrow+=`<span class="mlab">${m!==lastM?first.toLocaleDateString('en-US',{month:'short'}):''}</span>`;
    lastM=m;
    grid+=`<div class="wk">`;
    for(let dd=0;dd<7;dd++){
      const c=new Date(start2); c.setDate(start2.getDate()+w*7+dd);
      const iso=c.toLocaleDateString('en-CA');
      const future=iso>todayISO;
      grid+=`<i data-l="${dates.has(iso)?2:0}" class="${iso===todayISO?'today':''} ${future?'fut':''}" title="${iso}"></i>`;
    }
    grid+=`</div>`;
  }
  h+=`<div class="mrow">${mrow}</div><div class="heat">${grid}</div></div>`;
  h+=`</div></div></div>`;

  // days per month bars
  const ms=Object.entries(monthCounts).sort().slice(-12);
  const dayOfMonth=+todayISO.slice(8);
  const daysInMonth=new Date(+thisYear,+monthKey.slice(5),0).getDate();
  const trainedThis=monthCounts[monthKey]||0;
  h+=`<h2>Days trained, by month</h2><div class="card">
      <div class="zoom" data-zoom><div class="zoomhint">pinch to zoom</div>
      <svg viewBox="0 0 330 118" style="width:100%;height:auto">
      <line x1="8" y1="${94-20/31*80}" x2="316" y2="${94-20/31*80}" stroke="var(--line)" stroke-width="0.6" stroke-dasharray="2 3"></line>
      <text x="319" y="${96-20/31*80}" font-family="var(--mono)" font-size="7" fill="var(--muted)">20</text>`;
  ms.forEach(([m,n],i)=>{
    const cur=m===monthKey;
    const bh=Math.max(2,n/31*80), x=8+i*25.5;
    if(cur){                                  // dashed outline = days elapsed, so a short bar isn't misread
      const gh=dayOfMonth/31*80;
      h+=`<rect x="${x}" y="${94-gh}" width="17" height="${gh}" rx="3" fill="none"
            stroke="var(--accent)" stroke-width="0.8" stroke-dasharray="2 2"></rect>`;
    }
    h+=`<rect class="gbar" x="${x}" y="${94-bh}" width="17" height="${bh}" rx="3" fill="var(--accent)" opacity="${cur?1:.55}"></rect>`;
    if(cur){
      // trained count sits INSIDE the fill; the number above the dashes is days elapsed
      const gh=dayOfMonth/31*80;
      h+=`<text x="${x+8.5}" y="${94-gh-3}" text-anchor="middle" font-family="var(--mono)" font-size="7" fill="var(--muted)">${dayOfMonth}</text>
          <text x="${x+8.5}" y="${Math.min(91,94-bh+9)}" text-anchor="middle" font-family="var(--mono)" font-size="7" font-weight="700" fill="#fff">${n}</text>`;
    }else{
      h+=`<text x="${x+8.5}" y="${94-bh-3}" text-anchor="middle" font-family="var(--mono)" font-size="7" fill="var(--muted)">${n}</text>`;
    }
    h+=`<text x="${x+8.5}" y="107" text-anchor="middle" font-family="var(--mono)" font-size="7" fill="${cur?'var(--accent)':'var(--muted)'}">${m.slice(5)}</text>`;
  });
  h+=`</svg></div>
      <div class="tot"><span><b>${trainedThis}</b> trained · ${dayOfMonth-trainedThis} rested</span><span>${dayOfMonth} days into ${monthKey.slice(5)}</span></div></div>`;

  // monthly km — the Run tab owns the charts now; this map still feeds the
  // composition overlay further down.
  const kmBy={};
  for(const [m,v] of Object.entries(SEED.monthly)) kmBy[m]=v.km||0;
  for(const [d,v] of Object.entries(DB.days)){
    if(d<=SEED.totals.last) continue;
    for(const s of v.w) if(s.ex==='Run') kmBy[d.slice(0,7)]=(kmBy[d.slice(0,7)]||0)+s.w;
  }

  // which weekdays you show up — last 365 days, on an absolute 0–100% scale
  const wdC=[0,0,0,0,0,0,0], wdT=[0,0,0,0,0,0,0];
  for(let i=0;i<365;i++){
    const c=new Date(todayISO+'T00:00'); c.setDate(c.getDate()-i);
    const w=c.getDay(); wdT[w]++;
    if(dates.has(c.toLocaleDateString('en-CA'))) wdC[w]++;
  }
  const wdPct=wdC.map((n,i)=>n/wdT[i]);
  const wdBest=Math.max(...wdPct);
  h+=`<h2>Which days you show up</h2><div class="card">
      <svg viewBox="0 0 330 140" style="width:100%;height:auto">`;
  for(const g of [0,25,50,75,100]){
    const y=112-g/100*96;
    h+=`<line x1="24" y1="${y}" x2="316" y2="${y}" stroke="var(--line)" stroke-width="0.6" ${g?'stroke-dasharray="2 3"':''}></line>
        <text x="21" y="${y+3}" text-anchor="end" font-family="var(--mono)" font-size="7" fill="var(--muted)">${g}</text>`;
  }
  ['S','M','T','W','T','F','S'].forEach((lab,i)=>{
    const p=wdPct[i], strongest=p===wdBest;
    const bh=Math.max(2,p*96), x=32+i*41;
    h+=`<rect class="gbar" x="${x}" y="${112-bh}" width="26" height="${bh}" rx="4"
          fill="${strongest?'var(--accent)':'var(--accent-dim)'}" opacity="${strongest?1:.6}"></rect>
        <text x="${x+13}" y="${108-bh}" text-anchor="middle" font-family="var(--mono)" font-size="8" fill="${strongest?'var(--accent)':'var(--muted)'}" font-weight="${strongest?700:400}">${Math.round(p*100)}%</text>
        <text x="${x+13}" y="127" text-anchor="middle" font-family="var(--mono)" font-size="9" fill="${strongest?'var(--chalk)':'var(--muted)'}" font-weight="${strongest?700:400}">${lab}</text>`;
  });
  h+=`</svg><div class="note">% of each weekday trained, last 365 days</div></div>`;

  // month-by-month composition — the sheet's "Which part am I missing out?" chart
  const PART_COLORS={Shoulder:'#5B7BFF',Back:'#D06A5F',Chest:'#E3B84F',Legs:'#5CB57E',Biceps:'#B07FD8',Triceps:'#8A9BE0',Sixpack:'#7C8296'};
  const compBy={};                                    // month -> part -> entry count
  const addComp=(m,p)=>{ (compBy[m]=compBy[m]||{})[p]=(compBy[m][p]||0)+1; };
  for(const [d,list] of Object.entries(SEED.sessions))
    for(const [p] of list) if(p&&p!=='Run'&&p!=='Rest') addComp(d.slice(0,7),p);
  for(const [d,v] of Object.entries(DB.days)){
    if(d<=SEED.totals.last) continue;
    for(const s of v.w) if(s.part&&s.part!=='Run') addComp(d.slice(0,7),s.part);
  }
  const compMonths=Object.keys(compBy).sort();
  const compMax=Math.max(...compMonths.map(m=>Object.values(compBy[m]).reduce((a,b)=>a+b,0)),1);
  const kmMax2=Math.max(...compMonths.map(m=>kmBy[m]||0),1);
  const BW=9, GAP=4, LPAD=26, RPAD=24, CH=150, CTOP=8;
  const CWIDTH=LPAD+compMonths.length*(BW+GAP)+RPAD;
  const compParts=['Shoulder','Back','Chest','Legs','Biceps','Triceps','Sixpack'];
  h+=`<h2 id="secParts">Every month, by part</h2><div class="card">
      <div class="legend1" style="margin:0 0 10px">`;
  compParts.filter(p=>compMonths.some(m=>compBy[m][p])).forEach(p=>{
    h+=`<span><i style="background:${PART_COLORS[p]};height:8px;width:8px;border-radius:2px"></i>${p}</span>`;
  });
  h+=`<span><i style="background:var(--accent-dim);height:2px;width:12px"></i>Run ${DU()}</span>`;
  h+=`</div><div class="compscroll"><svg viewBox="0 0 ${CWIDTH} 196" width="${CWIDTH}" height="196">`;
  for(const g of [0.5,1]){
    const y=CTOP+CH-g*CH;
    h+=`<line x1="${LPAD}" y1="${y}" x2="${CWIDTH-RPAD}" y2="${y}" stroke="var(--line)" stroke-width="0.5" stroke-dasharray="2 3"></line>
        <text x="${LPAD-3}" y="${y+3}" text-anchor="end" font-family="var(--mono)" font-size="7" fill="var(--muted)">${Math.round(compMax*g)}</text>`;
  }
  let runPts='';
  compMonths.forEach((m,i)=>{
    const x=LPAD+i*(BW+GAP);
    let y=CTOP+CH;
    for(const p of compParts){
      const n=compBy[m][p]||0;
      if(!n) continue;
      const bh=n/compMax*CH;
      y-=bh;
      h+=`<rect x="${x}" y="${y.toFixed(1)}" width="${BW}" height="${Math.max(bh,0.5).toFixed(1)}" fill="${PART_COLORS[p]}" opacity="0.9"></rect>`;
    }
    const km=kmBy[m]||0;
    runPts+=`${(x+BW/2).toFixed(1)},${(CTOP+CH-km/kmMax2*CH).toFixed(1)} `;
    if(m.endsWith('-01')||i===0)
      h+=`<text x="${x+BW/2}" y="${CTOP+CH+12}" text-anchor="middle" font-family="var(--mono)" font-size="7" fill="var(--muted)">${m.slice(0,4)}</text>`;
  });
  h+=`<polyline points="${runPts}" fill="none" stroke="var(--accent-dim)" stroke-width="1.5" opacity="0.9" stroke-linejoin="round"></polyline>
      <text x="${CWIDTH-RPAD+3}" y="${CTOP+8}" font-family="var(--mono)" font-size="7" fill="var(--muted)">${Math.round(toD(kmMax2))}${DU()}</text>
      </svg></div>
      <div class="note">Stacked = logged entries per body part each month since ${compMonths[0]}. Line = distance run. Scroll sideways.</div></div>`;

  // hexagon: sessions per muscle group, last 30 days, fixed 0–8 scale
  const dpp=dayParts();
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-30);
  const cISO=cutoff.toLocaleDateString('en-CA');
  const sess30={};
  for(const [d,set] of Object.entries(dpp))
    if(d>=cISO) for(const p of set) sess30[p]=(sess30[p]||0)+1;
  const AXES=[
    ['Chest',['Chest']],['Back',['Back']],['Shoulders',['Shoulder']],
    ['Legs',['Legs']],['Arms',['Biceps','Triceps']],['Core',['Sixpack']],
  ];
  const HEXMAX=8;                                  // outer ring = 8 sessions ≈ twice a week
  const vals=AXES.map(([name,parts])=>{
    const got=parts.reduce((a,p)=>a+(sess30[p]||0),0);
    return {name, got, r:Math.min(1,got/HEXMAX)};
  });
  const CX=120, CY=96, R=64;
  const pt=(i,rr)=>{const a=-Math.PI/2+i*Math.PI/3;return [CX+rr*Math.cos(a),CY+rr*Math.sin(a)];};
  h+=`<h2>Sessions per muscle · last 30 days</h2><div class="card">
      <svg viewBox="0 0 240 196" style="width:100%;max-width:340px;height:auto;display:block;margin:0 auto">`;
  for(const g of [2,4,6,8]){
    const ring=AXES.map((_,i)=>pt(i,R*g/HEXMAX).map(n=>n.toFixed(1)).join(',')).join(' ');
    h+=`<polygon points="${ring}" fill="none" stroke="var(--line)" stroke-width="${g===HEXMAX?1:0.5}"></polygon>
        <text x="${CX+3}" y="${CY-R*g/HEXMAX-2}" font-family="var(--mono)" font-size="6.5" fill="var(--muted)">${g}</text>`;
  }
  AXES.forEach((_,i)=>{const [x,y]=pt(i,R);
    h+=`<line x1="${CX}" y1="${CY}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="var(--line)" stroke-width="0.5"></line>`;});
  const poly=vals.map((v,i)=>pt(i,Math.max(0.03,v.r)*R).map(n=>n.toFixed(1)).join(',')).join(' ');
  h+=`<polygon points="${poly}" fill="var(--accent)" fill-opacity="0.22" stroke="var(--accent)" stroke-width="1.6" stroke-linejoin="round"></polygon>`;
  vals.forEach((v,i)=>{
    const [x,y]=pt(i,Math.max(0.03,v.r)*R);
    h+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.4" fill="var(--accent)"></circle>`;
    const [lx,ly]=pt(i,R+22);
    h+=`<text x="${lx.toFixed(1)}" y="${(ly-3).toFixed(1)}" text-anchor="middle" font-family="var(--mono)" font-size="8.5" fill="var(--chalk)" font-weight="600">${v.name}</text>
        <text x="${lx.toFixed(1)}" y="${(ly+7).toFixed(1)}" text-anchor="middle" font-family="var(--mono)" font-size="8" fill="${v.got?'var(--accent)':'var(--muted)'}">${v.got}×</text>`;
  });
  h+=`</svg><div class="note">Times each group was trained in the last 30 days. Outer ring = 8 — about twice a week. Arms = biceps + triceps, Core = sixpack.</div></div>`;

  // the whole Run story lives here now (was its own tab in v2.04 — reverted)
  h+=runStatsHTML();

  // records — kept, but demoted below the days story
  h+=`<h2 id="secRecords">Records</h2>`;
  for(const part of Object.keys(SEED.catalog)){
    if(part==='Run') continue;
    const rows=catFor(part).map(e=>[e,prFor(e),exTier(e)]).filter(([,p])=>p.mw>0).sort((a,b)=>b[1].mw-a[1].mw);
    if(!rows.length) continue;
    const core=rows.filter(r=>r[2]==='goto'), other=rows.filter(r=>r[2]!=='goto');
    h+=`<h2 class="quiet" style="margin-top:16px">${part}</h2>`;
    if(core.length){
      h+=`<table class="rec-core"><tr><th>Core exercises</th><th style="text-align:right">Top (${U()})</th></tr>`;
      core.forEach(([e,p])=>{h+=`<tr><td><b>${e}</b></td><td class="n"><b>${wDisp(p.mw)}</b> × ${p.mwr}
        <button class="tmove" data-tier-ex="${e}" data-tier-to="other" title="Move to Other">↓</button></td></tr>`;});
      h+=`</table>`;
    }
    if(other.length){
      h+=`<table class="rec-other"><tr><th>Other</th><th></th></tr>`;
      other.forEach(([e,p])=>{h+=`<tr><td>${e}</td><td class="n">${wDisp(p.mw)} × ${p.mwr}
        <button class="tmove" data-tier-ex="${e}" data-tier-to="core" title="Move to Core">↑</button></td></tr>`;});
      h+=`</table>`;
    }
  }

  h+=`<h2>Settings</h2>
      <button class="btn ghost" id="settingsBtn">⚙︎ Settings, account &amp; sync</button>
      <div class="note" style="text-align:center">${session?`Signed in as ${session.user.email||'—'}`:'Not signed in — data is on this device only'} · ${APP_VERSION}</div>`;
  $('#view').innerHTML=h;
}

/* ---------- History ---------- */
function renderHistory(){
  const dates=workoutDates();
  const detail=allDays();
  if(!hist.y){ hist.y=+thisYear; hist.m=+todayISO.slice(5,7); }

  // merged monthly summary (seed + app logs)
  const monthly=JSON.parse(JSON.stringify(SEED.monthly));
  for(const [d,v] of Object.entries(DB.days)){
    if(!v.w.length || d<=SEED.totals.last) continue;
    const m=d.slice(0,7);
    const mm=monthly[m]=monthly[m]||{days:0,vol:0,km:0,sets:0};
    mm.days++;
    v.w.forEach(s=>{ if(s.ex==='Run')mm.km+=s.w; else{mm.vol+=volOf(s);mm.sets+=s.reps.length;} });
  }

  const firstYear=SEED.totals.first?+SEED.totals.first.slice(0,4):+thisYear;
  const years=[]; for(let y=firstYear; y<=+thisYear; y++) years.push(y);
  let h=`<div class="chips" style="margin-bottom:8px">`;
  years.forEach(y=>{
    const n=[...dates].filter(d=>+d.slice(0,4)===y).length;
    h+=`<button class="chip ${y===hist.y?'on':''}" data-histy="${y}">${y}<span class="n">${n}d</span></button>`;
  });
  h+=`</div><div class="mchips">`;
  for(let m=1;m<=12;m++){
    const key=`${hist.y}-${String(m).padStart(2,'0')}`;
    const n=(monthly[key]||{}).days||0;
    const future=key>todayISO.slice(0,7);
    h+=`<button class="mchip ${m===hist.m?'on':''} ${(!n||future)?'dim':''}" data-histm="${m}" ${future?'disabled':''}>
          <span>${new Date(hist.y,m-1,1).toLocaleDateString('en-US',{month:'short'})}</span><b>${future?'·':n}</b></button>`;
  }
  h+=`</div>`;

  // month calendar
  const key=`${hist.y}-${String(hist.m).padStart(2,'0')}`;
  const dim=new Date(hist.y,hist.m,0).getDate();
  const off=new Date(hist.y,hist.m-1,1).getDay();
  const mm=monthly[key]||{days:0,vol:0,km:0,sets:0};
  h+=`<div class="card" style="margin-top:12px">
        <div class="row spread" style="margin-bottom:10px">
          <b style="font-family:var(--disp)">${new Date(hist.y,hist.m-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'})}</b>
          <span class="mono muted" style="font-size:12px"><b style="color:var(--accent)">${mm.days}</b> days trained</span>
        </div>
        <div class="cal">
          ${['S','M','T','W','T','F','S'].map(d=>`<span class="cw">${d}</span>`).join('')}
          ${'<span></span>'.repeat(off)}`;
  for(let d=1;d<=dim;d++){
    const iso=`${key}-${String(d).padStart(2,'0')}`;
    const on=dates.has(iso), today=iso===todayISO, fut=iso>todayISO;
    h+=`<span class="cd ${on?'on':''} ${today?'now':''} ${fut?'fut':''}">${d}</span>`;
  }
  h+=`</div>
      <div class="tot" style="margin-top:12px">
        <span>${mm.sets?fmt(mm.sets)+' sets':''}${mm.sets&&mm.km?' · ':''}${mm.km?dDisp(mm.km)+' '+DU():''}</span>
        <span>${mm.vol?vDisp(mm.vol)+' '+U()+' lifted':''}</span></div></div>`;

  // day cards for that month, where detail exists
  const monthDays=Object.keys(detail).filter(d=>d.startsWith(key)).sort().reverse();
  if(monthDays.length){
    h+=`<h2 class="quiet">Sessions</h2>`;
    monthDays.forEach(d=>{
      const list=detail[d];
      const vol=list.reduce((a,s)=>a+volOf(s),0);
      const km=list.filter(s=>s.ex==='Run').reduce((a,s)=>a+s.w,0);
      const parts=[...new Set(list.map(s=>s.part).filter(Boolean))].join(' · ');
      const bits=[];
      if(vol)bits.push(vDisp(vol)+' '+U());
      if(km)bits.push(dDisp(km)+DU());
      h+=`<details class="day"><summary>
          <span><span class="d">${pretty(d)}</span><div class="s">${parts||'—'}</div></span>
          <span class="s">${bits.join(' · ')}</span></summary><div class="body">`;
      list.forEach(s=>{
        h+=s.ex==='Run'
          ?`<div><b>Run</b> — ${dDisp(s.w)} ${DU()} · ${s.mins||0}'${String(s.secs||0).padStart(2,'0')}"</div>`
          :`<div><b>${s.ex}</b> — ${wDisp(s.w)} ${U()} × ${s.reps.join(', ')}</div>`;
      });
      h+=`</div></details>`;
    });
  }else if(mm.days){
    h+=`<div class="note" style="margin-top:12px">Set-level detail for this month lives in the sheet —
        the app carries full sessions for roughly the last four months, plus anything logged here.</div>`;
  }else{
    h+=`<div class="note" style="margin-top:12px">No training logged this month.</div>`;
  }
  $('#view').innerHTML=h;
}

/* ---------- events ---------- */
document.addEventListener('click',e=>{
  const t=day(todayISO);
  if(e.target.closest('#unitBtn')){
    DB.settings.unit=isLb()?'kg':'lb';
    save(true);toast(isLb()?'Imperial — lb & miles':'Metric — kg & km');return render();
  }
  if(e.target.closest('#themeBtn')){
    DB.settings.theme=DB.settings.theme==='light'?'dark':'light';
    applyTheme();save(true);
    if(view==='sync') render();
    return;
  }
  const gs=e.target.closest('#goalSet')||e.target.closest('#goalEdit');
  if(gs){
    const cur=(DB.settings.kmGoal||{})[thisYear]||+(gs.dataset.suggest||0);
    const v=prompt(`${thisYear} goal — how many ${DU()}?`, cur||'');
    if(v!=null){
      const n=Math.round(+v);
      DB.settings.kmGoal=DB.settings.kmGoal||{};
      if(n>0) DB.settings.kmGoal[thisYear]=n; else delete DB.settings.kmGoal[thisYear];
      save(true); toast(n>0?`${thisYear} goal: ${fmt(n)} ${DU()}`:'Goal cleared');
      return render();
    }
    return;
  }
  const ng=e.target.closest('#nudgeGo');
  if(ng&&lift.ex){
    if(ng.dataset.nr){
      const rc=$('#rc');
      if(rc){ rc.value=ng.dataset.nr; rc.focus(); }
      toast(`Target: ${ng.dataset.nr} reps — go get it`);
      return;
    }
    lift.weight=+ng.dataset.nw;
    saveExW(lift.ex,lift.weight);save(true);
    toast(`Weight set to ${wDisp(lift.weight)} ${U()} — go get it`);
    return renderLift();
  }
  const nx=e.target.closest('[data-nudgex]');
  if(nx&&lift.ex){
    const v=nx.dataset.nudgex;
    DB.settings.nudgeX=DB.settings.nudgeX||{};
    DB.settings.nudgeX[lift.ex]=isNaN(+v)?v:+v;   // 'r12' for reps-mode, number for weight
    save(true);return renderLift();
  }
  if(e.target.id==='editSave'&&lift.editSet!=null){
    const es=t.w[lift.editSet];
    if(es){
      snapshot(`edited ${es.ex} set`);
      if(es.ex==='Run'){
        const dist=+($('#edW').value||0);
        if(!dist) return toast('Distance needed');
        es.w=fromD(dist); es.mins=+($('#edM').value||0); es.secs=+($('#edS').value||0);
      }else{
        const wv=toKg(+($('#edW').value||0));
        const reps=$('#edR').value.split(',').map(x=>Math.round(+x)).filter(x=>x>0);
        if(!reps.length) return toast('Enter reps');
        es.w=wv; es.reps=reps;
        saveExW(es.ex,wv);
      }
      touchToday();
      save();renderHeader();toast('Set updated');
    }
    lift.editSet=null;return renderLift();
  }
  if(e.target.id==='editCancel'){ lift.editSet=null; return renderLift(); }
  if(e.target.id==='doneExBtn'&&lift.ex){
    const m=dayMeta(); m.upd=Date.now();
    if(!m.doneEx.includes(lift.ex)) m.doneEx.push(lift.ex);
    // Cascade only when this part has ONE exercise today (the "Complete Run" flow).
    // Multi-exercise parts stay open — and undimmed — until the explicit Complete <part>.
    const exsInPart=new Set(m.w.filter(s=>s.part===lift.part).map(s=>s.ex));
    if(exsInPart.size===1){
      if(!m.donePart.includes(lift.part)) m.donePart.push(lift.part);
      if(!m.w.some(s=>!m.doneEx.includes(s.ex))) m.doneAll=true;
    }
    save();renderHeader();
    toast(m.doneAll?`Workout complete — ${m.w.length} sets. Cool down 🔥`:`${lift.ex} complete ✓`);
    lift.ex=null;return render();
  }
  if(e.target.id==='reopenPartBtn'&&lift.part){
    const m=dayMeta(); m.upd=Date.now();
    m.donePart=m.donePart.filter(p=>p!==lift.part);
    m.doneAll=false;                       // a reopened part reopens the workout
    save();renderHeader();toast(`${lift.part} reopened — back at it`);
    return render();
  }
  if(e.target.id==='donePartBtn'&&lift.part){
    const m=dayMeta(); m.upd=Date.now();
    m.w.filter(s=>s.part===lift.part).forEach(s=>{ if(!m.doneEx.includes(s.ex)) m.doneEx.push(s.ex); });
    if(!m.donePart.includes(lift.part)) m.donePart.push(lift.part);
    if([...new Set(m.w.map(s=>s.part))].every(p=>m.donePart.includes(p))) m.doneAll=true;
    save();renderHeader();
    toast(m.doneAll?`Workout complete — ${m.w.length} sets. Cool down 🔥`:`${lift.part} complete ✓`);return render();
  }
  if(e.target.id==='doneAllBtn'){
    const m=dayMeta(); m.upd=Date.now();
    m.w.forEach(s=>{ if(!m.doneEx.includes(s.ex)) m.doneEx.push(s.ex);
                     if(!m.donePart.includes(s.part)) m.donePart.push(s.part); });
    m.doneAll=true;
    save();renderHeader();
    toast(`Workout complete — ${m.w.length} sets. Cool down 🔥`);
    return render();
  }
  const sx=e.target.closest('[data-sugx]');
  if(sx&&lift.ex){
    const m=dayMeta();
    m.sugX[lift.ex]=[...(m.sugX[lift.ex]||[]),sx.dataset.sugx];
    save();return renderLift();
  }
  if(e.target.closest('#settingsBtn')||e.target.closest('#gearBtn')){
    if(view==='sync'){ view=prevView||'today'; }
    else { prevView=view; view='sync'; }
    document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===view));
    return render();
  }
  const jump=e.target.closest('[data-jump]');
  if(jump){const el=document.getElementById(jump.dataset.jump);
    if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); return;}
  const nav=e.target.closest('nav button');
  if(nav){
    if(session) cloudPush();
    view=nav.dataset.v;
    if(view==='lift')lift={part:null,ex:null,weight:0};
    document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b===nav));
    return render();
  }
  const go=e.target.closest('[data-go]');
  if(go){
    view='lift';lift={part:go.dataset.go,ex:null,weight:0};
    document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.v==='lift'));
    return render();
  }
  const pt=e.target.closest('[data-part]:not([data-ex])');
  if(pt){lift.part=pt.dataset.part;lift.ex=null;lift.weight=0;return render();}
  const ex=e.target.closest('[data-ex]');
  if(ex){
    lift.part=ex.dataset.part||lift.part; lift.ex=ex.dataset.ex;
    lift.weight=0; lift.editBar=false; lift.copy=false; lift.suggestOpen=null; lift.info=false; lift.editSet=null;
    view='lift';                                   // <- was missing: Today stayed on Today
    document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.v==='lift'));
    return render();
  }
  if(e.target.closest('.back')){
    if(lift.copy){ lift.copy=false; return renderLift(); }
    if(view==='sync'){view=prevView||'today';document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===view));return render();}
    if(lift.ex)lift.ex=null;else lift.part=null;
    return render();
  }
  const wb=e.target.closest('[data-w]');
  if(wb){
    const shown=Math.max(0,(+($('#wv').value||0))+(+wb.dataset.w)*STEP());
    lift.weight=toKg(shown);
    saveExW(lift.ex,lift.weight);save(true);
    const wvEl=$('#wv');
    wvEl.value=Math.round(shown*10)/10;
    wvEl.classList.remove('wflash'); void wvEl.offsetWidth; wvEl.classList.add('wflash');
    refreshLoad();return;
  }
  const rb=e.target.closest('[data-rep]');
  if(rb){
    lift.weight=toKg(+($('#wv').value||0));
    saveExW(lift.ex,lift.weight);
    t.w.push({part:lift.part,ex:lift.ex,w:lift.weight,reps:[+rb.dataset.rep],at:Date.now()});
    reopen(lift.ex,lift.part);
    lift.justSaved=true;save();renderHeader();return renderLift();
  }
  if(e.target.id==='addrep'){
    const r=Math.round(+($('#rc').value||0));
    if(!r||r<1) return toast('Enter a rep count');
    lift.weight=toKg(+($('#wv').value||0));
    saveExW(lift.ex,lift.weight);
    t.w.push({part:lift.part,ex:lift.ex,w:lift.weight,reps:[r],at:Date.now()});
    reopen(lift.ex,lift.part);
    lift.justSaved=true;save();renderHeader();return renderLift();
  }
  const rs=e.target.closest('[data-rep-w]');
  if(rs){
    const w=+rs.dataset.repW, r=+rs.dataset.repR;
    t.w.push({part:lift.part,ex:lift.ex,w,reps:[r],at:Date.now()});
    reopen(lift.ex,lift.part);
    lift.weight=w;
    saveExW(lift.ex,w);
    lift.justSaved=true;save();renderHeader();toast(`${wDisp(w)}${U()} × ${r} logged`);return renderLift();
  }
  if(e.target.id==='addEx'){ lift.adding=true; return renderLift(); }
  if(e.target.id==='cancelEx'){ lift.adding=false; return renderLift(); }
  const ne=e.target.closest('[data-newequip]');
  if(ne){ lift.newEquip=ne.dataset.newequip; return renderLift(); }
  if(e.target.id==='saveEx'){
    const name=($('#newExName').value||'').trim();
    if(!name) return toast('Name it first');
    if(SEED.equip[name]||customs()[name]) return toast('That exercise already exists');
    DB.settings.custom={...customs(), [name]:{part:lift.part, equip:lift.newEquip||'barbell'}};
    lift.adding=false;
    save(true); toast(`${name} added to ${lift.part}`);
    lift.ex=name; lift.weight=0;
    return renderLift();
  }
  const de=e.target.closest('[data-delex]');
  if(de){
    const n=de.dataset.delex;
    const c={...customs()}; delete c[n];
    DB.settings.custom=c;
    save(); toast(`${n} deleted`); return renderLift();
  }
  const tm=e.target.closest('[data-tier-ex]');
  if(tm){
    DB.settings.tierOv={...(DB.settings.tierOv||{}), [tm.dataset.tierEx]: tm.dataset.tierTo};
    save(true); toast(`${tm.dataset.tierEx} → ${tm.dataset.tierTo==='core'?'Core':'Other'}`);
    return renderStats();
  }
  const hy=e.target.closest('[data-histy]');
  if(hy){ hist.y=+hy.dataset.histy;
    const mk2=`${hist.y}-${String(hist.m).padStart(2,'0')}`;
    if(mk2>todayISO.slice(0,7)) hist.m=+todayISO.slice(5,7);
    return renderHistory(); }
  const hm=e.target.closest('[data-histm]');
  if(hm){ hist.m=+hm.dataset.histm; return renderHistory(); }
  if(e.target.id==='infoBtn'){ lift.info=!lift.info; return renderLift(); }
  if(e.target.closest('#toggleSuggest')){
    const cur = lift.suggestOpen==null ? day(todayISO).w.some(s=>s.ex===lift.ex)===false : lift.suggestOpen;
    lift.suggestOpen=!cur; return renderLift();
  }
  if(e.target.id==='copySets'){
    const ls2=suggestedFor(lift.ex);
    lift.copy={mode:'suggestion', sets:ls2?[...ls2.sets]:[], d:ls2?.d||null};
    return renderLift();
  }
  if(e.target.id==='moveToday'){
    touchToday();
    lift.copy={mode:'today',
      sets:t.w.filter(s=>s.ex===lift.ex).flatMap(s=>s.reps.map(r=>({w:s.w,r}))), d:null};
    return renderLift();
  }
  if(e.target.closest('[data-cancelcopy]')){ lift.copy=false; return renderLift(); }
  if(e.target.id==='undoBtn') return undo();
  const dx=e.target.closest('[data-dropex]');
  if(dx){
    const ex2=dx.dataset.dropex;
    const n=t.w.filter(s=>s.ex===ex2).length;
    snapshot(`removed ${n} ${ex2} set${n>1?'s':''}`);
    DB.days[todayISO].w=t.w.filter(s=>s.ex!==ex2);
    reanchorRest();
    save();renderHeader();toast(`${ex2} removed from today`);return renderLift();
  }
  if(e.target.id==='clearToday'){
    const n=t.w.filter(s=>s.ex===lift.ex).length;
    if(!n) return;
    snapshot(`cleared ${n} ${lift.ex} sets`);
    t.w=t.w.filter(s=>s.ex!==lift.ex);
    DB.days[todayISO].w=t.w;
    reanchorRest();
    save();renderHeader();toast(`Cleared ${n} sets — undo below`);return renderLift();
  }
  const ct=e.target.closest('[data-copyto]');
  if(ct){
    const target=ct.dataset.copyto, tpart=ct.dataset.copypart;
    const moving=lift.copy.mode==='today';
    const sets=lift.copy.sets;
    if(!sets.length){ lift.copy=false; return renderLift(); }
    if(moving){
      snapshot(`moved ${sets.length} sets to ${target}`);
      t.w=t.w.filter(s=>s.ex!==lift.ex);
      DB.days[todayISO].w=t.w;
      sets.forEach(s=>DB.days[todayISO].w.push({part:tpart,ex:target,w:s.w,reps:[s.r]}));
      toast(`${sets.length} sets moved to ${target}`);
    }else{
      sugOv()[target]={sets:[...sets], d:lift.copy.d||todayISO, from:lift.ex};
      toast(`Suggested for ${target} — nothing logged`);
    }
    save();
    lift.copy=false; lift.part=tpart; lift.ex=target; lift.weight=0; lift.suggestOpen=true;
    renderHeader();
    return renderLift();
  }
  if(e.target.id==='repeatAll'){
    const ls=suggestedFor(lift.ex);
    const dis=new Set(dayMeta().sugX[lift.ex]||[]);
    const mine=t.w.filter(s=>s.ex===lift.ex);
    const lastToday=mine.length?mine[mine.length-1]:null;
    let pool=[];
    if(lastToday&&lastToday.reps&&lastToday.reps.length)
      pool.push({w:lastToday.w,r:lastToday.reps[0],key:`now|${lastToday.w}|${lastToday.reps[0]}`});
    (ls?ls.sets:[]).forEach((s,i)=>pool.push({w:s.w,r:s.r,key:`${s.w}|${s.r}|${i}`}));
    const seenWR=new Set();
    pool=pool.filter(c=>{const k=`${c.w}x${c.r}`;if(seenWR.has(k))return false;seenWR.add(k);return true;});
    const chips=pool.filter(c=>!dis.has(c.key)).slice(0,6);
    if(!chips.length) return;
    snapshot(`logged ${chips.length} sets`);
    chips.forEach(s=>t.w.push({part:lift.part,ex:lift.ex,w:s.w,reps:[s.r],at:Date.now()}));
    reopen(lift.ex,lift.part);
    save();renderHeader();toast(`${chips.length} sets logged`);return renderLift();
  }
  if(e.target.closest('[data-editbar]')){ lift.editBar=true; return renderLift(); }
  if(e.target.closest('[data-cancelbar]')){ lift.editBar=false; return renderLift(); }
  const sba=e.target.closest('[data-savebarall]');
  if(sba){
    const ex2=sba.dataset.savebarall;
    const kg=toKg(parseFloat($('#barIn').value));
    if(isNaN(kg)||kg<0) return toast('Enter a number');
    if(equipOf(ex2)==='smith') DB.settings.smithKg=kg; else DB.settings.barKg=kg;
    if(DB.settings.barByEx) delete DB.settings.barByEx[ex2];   // global now applies here too
    lift.editBar=false;
    save(true);toast(`${equipOf(ex2)==='smith'?'Smith':'Barbell'} bar set to ${wDisp(kg)}${U()} everywhere`);
    return renderLift();
  }
  const sb=e.target.closest('[data-savebar]');
  if(sb){
    const ex2=sb.dataset.savebar;
    const kg=toKg(parseFloat($('#barIn').value));
    if(isNaN(kg)||kg<0) return toast('Enter a number');
    DB.settings.barByEx=DB.settings.barByEx||{};
    DB.settings.barByEx[ex2]=kg;
    lift.editBar=false;
    save(true);toast(`Bar set to ${wDisp(kg)}${U()} for ${ex2}`);return renderLift();
  }
  if(e.target.id==='addrun'){
    const dist=+($('#rk').value||0);
    if(!dist)return toast('Distance needed');
    const km=fromD(dist);
    snapshot(`logged ${dDisp(km)}${DU()} run`);
    t.w.push({part:'Run',ex:'Run',w:km,reps:[],mins:+($('#rm').value||0),secs:+($('#rs').value||0),at:Date.now()});
    reopen('Run','Run');
    save();renderHeader();return renderLift();
  }
  const del=e.target.closest('[data-del]');
  if(del){
    if(lpFired){ lpFired=false; return; }
    const s=t.w[+del.dataset.del];
    snapshot(`deleted ${wDisp(s.w)}${U()}×${s.reps[0]||''}`);
    t.w.splice(+del.dataset.del,1);
    reanchorRest();
    save();renderHeader();return renderLift();
  }
  if(e.target.id==='googleBtn') return signInGoogle();
  if(e.target.id==='signOutBtn') return signOut();
  if(e.target.id==='cloudPullBtn') return cloudPull();
  if(e.target.id==='cloudTest'){
    DB.settings.cloud={url:$('#cloudUrl').value, anon:$('#cloudAnon').value};
    save(true);
    return cloudTest();
  }
  if(e.target.id==='cloudSave'){
    DB.settings.cloud={url:$('#cloudUrl').value, anon:$('#cloudAnon').value};
    save(true);
    toast(cloudReady()?'Using '+cloudCfg().url:'Both fields are needed');
    return renderSync();
  }
  if(e.target.id==='barSave'){
    DB.settings.barKg=toKg(+($('#barW').value||0))||20;
    DB.settings.smithKg=toKg(+($('#smithW').value||0));
    const bw=+($('#bodyW').value||0);
    DB.settings.bodyKg=bw>0?toKg(bw):null;
    save(true);return toast('Weights saved');
  }
});

/* a tiny picture of the loaded bar: plates, bar, plates */
function barViz(ex,totalKg){
  if(!usesPlates(ex)) return '';
  const bar=barKg(ex), perSide=(totalKg-bar)/2;
  if(perSide<=0.01) return `<span class="barviz"><span class="bar"></span></span>`;
  const p=plates(perSide);
  const big=Math.max(...p,1);
  const pl=p.map(x=>`<span class="pl" style="height:${(8+18*(x/big)).toFixed(0)}px"></span>`).join('');
  return `<span class="barviz">${[...p].reverse().map(x=>`<span class="pl" style="height:${(8+18*(x/big)).toFixed(0)}px"></span>`).join('')}<span class="bar"></span>${pl}</span>`;
}
function refreshLoad(){
  const ll=$('#ll'); if(!ll||!lift.ex) return;
  const kg=toKg(+($('#wv').value||0));
  ll.innerHTML = usesPlates(lift.ex)
    ? loadInner(lift.ex,kg)
    : `<span class="ll-text">${loadLine(lift.ex,kg)}</span>`;
}

/* ---------- pinch / wheel zoom for charts ---------- */
function bindZoom(box){
  if(box.dataset.bound) return;
  box.dataset.bound='1';
  const svg=box.querySelector('svg');
  const vb0=svg.getAttribute('viewBox').split(/\s+/).map(Number);   // [x,y,w,h]
  let vb=[...vb0];
  const apply=()=>{
    svg.setAttribute('viewBox',vb.join(' '));                       // vector-crisp at any zoom
    const hint=box.querySelector('.zoomhint');
    if(hint) hint.style.opacity = (vb[2] < vb0[2]-0.5) ? 0 : .75;
  };
  const clamp=()=>{
    vb[2]=Math.min(vb0[2],Math.max(vb0[2]/12,vb[2]));
    vb[3]=vb[2]*vb0[3]/vb0[2];
    vb[0]=Math.min(vb0[0]+vb0[2]-vb[2],Math.max(vb0[0],vb[0]));
    vb[1]=Math.min(vb0[1]+vb0[3]-vb[3],Math.max(vb0[1],vb[1]));
  };
  const pt=(px,py)=>{                                               // screen px -> svg units
    const r=box.getBoundingClientRect();
    return [vb[0]+(px/r.width)*vb[2], vb[1]+(py/r.height)*vb[3]];
  };
  const zoomAt=(px,py,f)=>{
    const [ux,uy]=pt(px,py);
    const w=vb[2]/f, hgt=vb[3]/f;
    vb=[ux-(ux-vb[0])/f, uy-(uy-vb[1])/f, w, hgt];
    clamp(); apply();
  };
  const rel=e=>{const r=box.getBoundingClientRect();return [e.clientX-r.left,e.clientY-r.top];};

  box.addEventListener('wheel',e=>{e.preventDefault();const [x,y]=rel(e);zoomAt(x,y,e.deltaY<0?1.15:1/1.15);},{passive:false});

  const pts=new Map(); let d0=0,w0=0,mid=[0,0],last=null,tap=0;
  box.addEventListener('pointerdown',e=>{
    box.setPointerCapture(e.pointerId); pts.set(e.pointerId,rel(e));
    if(pts.size===2){const [a,b]=[...pts.values()];
      d0=Math.hypot(a[0]-b[0],a[1]-b[1]); w0=vb[2]; mid=[(a[0]+b[0])/2,(a[1]+b[1])/2];}
    else{ last=rel(e);
      const now=Date.now();
      if(now-tap<300){ vb=[...vb0]; apply(); }
      tap=now; }
  });
  box.addEventListener('pointermove',e=>{
    if(!pts.has(e.pointerId)) return;
    pts.set(e.pointerId,rel(e));
    if(pts.size===2){
      const [a,b]=[...pts.values()];
      const d=Math.hypot(a[0]-b[0],a[1]-b[1]);
      if(d0){ const target=w0*(d0/d), f=vb[2]/target; zoomAt(mid[0],mid[1],f); }
      e.preventDefault();
    }else if(pts.size===1 && vb[2]<vb0[2]-0.5 && last){
      const p=rel(e), r=box.getBoundingClientRect();
      vb[0]-=(p[0]-last[0])/r.width*vb[2];
      vb[1]-=(p[1]-last[1])/r.height*vb[3];
      last=p; clamp(); apply(); e.preventDefault();
    }
  });
  const up=e=>{pts.delete(e.pointerId); if(pts.size<2)d0=0; if(!pts.size)last=null;};
  box.addEventListener('pointerup',up);
  box.addEventListener('pointercancel',up);
}

/* ---------- boot ---------- */
const MOTION_OK=typeof matchMedia==='function' ? matchMedia('(prefers-reduced-motion:no-preference)').matches : true;
function paint(){
  ({today:renderToday,lift:renderLift,stats:renderStats,history:renderHistory,sync:renderSync})[view]();
  document.querySelectorAll('[data-zoom]').forEach(bindZoom);
  if(MOTION_OK){ try{ motionPass(); }catch(_e){ /* motion is decoration — it never gets to break the app */ } }
  window.scrollTo(0,0);
}
let lastView=null;
function render(){
  renderHeader();
  // tab switches cross-fade via the View Transitions API; in-view re-renders
  // (logging a set, toggling a setting) must NOT flash, so they paint directly
  if(MOTION_OK && document.startViewTransition && lastView!==null && lastView!==view){
    lastView=view; document.startViewTransition(paint);
  } else { lastView=view; paint(); }
}
let floatIO=null;
function motionPass(){
  const v=document.getElementById('view');
  // 5. stagger the big blocks, capped so deep pages don't feel slow
  [...v.children].forEach((el,i)=>el.style.setProperty('--i',Math.min(i,9)));
  // 5b. anything below the fold floats up on scroll instead
  if('IntersectionObserver' in window){
    if(floatIO) floatIO.disconnect();
    floatIO=new IntersectionObserver(es=>{
      for(const en of es) if(en.isIntersecting){
        en.target.classList.add('float-in');
        en.target.classList.remove('float-pre');
        floatIO.unobserve(en.target);
      }
    },{rootMargin:'0px 0px -6% 0px'});
    v.querySelectorAll('.card,.zone,.kpis,table,.item').forEach(el=>{
      if(el.closest('.float-pre')&&el.classList.contains('item')) return;   // don't double-float nested items
      if(el.getBoundingClientRect().top>innerHeight){
        el.classList.add('float-pre');
        floatIO.observe(el);
      }
    });
  }
  // 6a. every chart line sweeps in once
  v.querySelectorAll('svg polyline').forEach((pl,i)=>{
    const len=Math.ceil(pl.getTotalLength());
    pl.style.setProperty('--len',len); pl.style.setProperty('--i',i%6);
    pl.classList.add('draw');
  });
  // 6b. bars grow from their baseline (single-series bars are tagged gbar)
  v.querySelectorAll('svg rect.gbar').forEach((r,i)=>r.style.setProperty('--i',i%20));
  // 4. KPI numbers count up — only plain numbers; paces and dates stay put
  if(typeof requestAnimationFrame!=='function') return;
  v.querySelectorAll('.kpi .v').forEach(el=>{
    const raw=el.textContent.trim(), m=raw.match(/^([\d,]+)$/);
    if(!m) return;
    const target=+m[1].replace(/,/g,''); if(!target) return;
    const t0=performance.now(), dur=450;
    const step=now=>{
      const p=Math.min(1,(now-t0)/dur), e=1-Math.pow(1-p,3);
      el.textContent=fmt(Math.round(target*e));
      if(p<1) requestAnimationFrame(step); else el.textContent=raw;
    };
    requestAnimationFrame(step);
  });
}
(async()=>{
  try{ if(screen.orientation&&screen.orientation.lock) screen.orientation.lock('portrait').catch(()=>{}); }catch(e){}
  await load();
  restoreWhere();
  dailyBackup();                     // snapshot PRE-migration state first
  const mig=migrateV3();
  SEED=deriveAll(); _fireDist=null;                  // miles fix needs runDays() → derive first
  const mi=migrateMiles();
  const un=migrateUnits();
  if(mig||mi||un){ save(true); }
  if(mi||un) SEED=deriveAll(); _fireDist=null;           // re-derive on converted history
  if(mi||un) setTimeout(()=>toast(`Units corrected — true totals: ${fmt(Math.round(SEED.totals.km))} km · ${fmt(SEED.totals.vol)} kg lifted`),900);
  stampLegacyDays();
  const fixed=repairDupes();
  if(fixed){ save(); toast(`Repaired ${fixed} duplicated set${fixed>1?'s':''}`); }
  checkMilestone();
  lastSetAt=(DB.days[todayISO]&&DB.days[todayISO].lastAt)||null;
  await loadSession();
  render();
  if(cloudReady()){
    await captureOAuth();                       // fresh sign-in pulls (initial sync) inside
    if(session) cloudPull();                    // every device syncs on open (per-day newest-wins)
  }
})();
</script>
