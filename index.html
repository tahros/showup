<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<script>/* pre-paint: apply the saved theme before any CSS renders */
try{document.documentElement.dataset.theme=localStorage.getItem('showup-theme')||'dark';}catch(e){}</script>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ShowUp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<meta name="color-scheme" content="dark light">
<meta name="theme-color" content="#0C0E13">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">

<div id="app">
  <header>
    <div class="brandrow">
      <button class="icobtn hback back" aria-label="Back">←</button>
      <div>
      <div class="h-date" id="hDate">—</div>
      <div class="h-sub" id="hSub">—</div>
      </div>
    </div>
    <div class="hbtns">
      <span class="resttimer" id="hTimer"></span>
      <span class="streak" id="hStreak"></span>
      <button class="icobtn" id="gearBtn" title="Settings, account &amp; sync">⚙</button>
    </div>
  </header>
  <main id="view"></main>
  <nav id="nav">
    <button data-v="today" class="on"><span>✅</span>Today</button>
    <button data-v="lift"><span>💪</span>Lift</button>
    <button data-v="stats"><span>📈</span>Stats</button>
    <button data-v="history"><span>📜</span>History</button>
  </nav>
  <div id="toast"></div>
<div id="portraitveil" aria-hidden="true">
  <div class="pv-mark">↻</div>
  <div class="pv-text">Portrait only</div>
  <div class="pv-sub">Rotate your phone back</div>
</div>
<div id="swipehint" aria-hidden="true"><span></span></div>
<div id="ptr" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round">
  <path d="M12 4v13M6 12l6 6 6-6"/></svg></div>
</div>
