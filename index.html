<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<script>/* pre-paint: apply the saved theme before any CSS renders */
try{document.documentElement.dataset.theme=localStorage.getItem('showup-theme')||'dark';}catch(e){}</script>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<meta name="theme-color" content="#121317">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ShowUp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --ground:#121317; --surface:#1B1D23; --surface2:#24272F; --line:#33373F;
    --accent:#5B7BFF; --accent-soft:#33417A; --accent-dim:#8A9BE0;
    --record:#E05545;                       /* the only non-blue: personal records */
    --live:#C93A2B;                         /* the header while your heart is pumping */
    --chalk:#ECEDF0; --muted:#8B909C; --faint:#5A5F6B; --shadow:none;
    --disp:'IBM Plex Sans',system-ui,sans-serif;
    --body:'IBM Plex Sans',system-ui,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
  }
  :root[data-theme="light"]{
    --ground:#F2F3F6; --surface:#FFFFFF; --surface2:#E8EAF0; --line:#D6D9E2;
    --accent:#2F4BD8; --accent-soft:#C3CCF5; --accent-dim:#8892C4;
    --record:#C33A2C;
    --live:#BE3324;
    --chalk:#191B21; --muted:#6B7080; --faint:#9AA0AE; --shadow:0 1px 3px rgba(20,25,40,.07);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--ground)}
  #app{
    max-width:520px;margin:0 auto;min-height:100vh;
    background:var(--ground);color:var(--chalk);
    font-family:var(--body);font-size:15px;line-height:1.45;
    padding-bottom:78px;position:relative;overflow-x:clip;  /* clip ≠ scroll container: sticky header survives */
  }
  header{
    position:sticky;top:0;z-index:20;background:var(--ground);
    border-bottom:1px solid var(--line);
    padding:calc(14px + env(safe-area-inset-top,0px)) 18px 12px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    transition:background .35s,border-color .35s;
  }
  header.live{background:var(--live);border-color:var(--live)}
  .resttimer{display:none;font-family:var(--mono);font-size:14px;font-weight:700;color:#fff;letter-spacing:.02em}
  header.live .resttimer{display:inline}
  .resttimer::before{content:'●';font-size:8px;margin-right:6px;vertical-align:2px;
    animation:pulse 1.2s ease-in-out infinite}
  .lastset.now{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
  .tipline{display:block;margin-top:7px;padding-top:7px;border-top:1px solid rgba(255,255,255,.18);
    font-size:11px;opacity:.85}
  .smeter{height:9px;border-radius:5px;background:var(--surface2);overflow:hidden;position:relative}
  .smeter i{display:block;height:100%;border-radius:5px;background:var(--accent);opacity:.75;transition:width .5s cubic-bezier(.2,.8,.25,1)}
  .smeter i.over{opacity:1;box-shadow:0 0 8px color-mix(in srgb,var(--accent) 60%,transparent)}
  .settile{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  .settile.editing{outline:2px solid var(--accent);outline-offset:1px}
  .editcard .row input{width:100%}
  .lschip{position:relative;display:inline-block}
  .lschip .lsx{position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;
    background:var(--surface2);border:1px solid var(--line);color:var(--muted);
    font-size:10px;line-height:1;padding:0;z-index:1}
  .zone.mini .zonehead{margin-bottom:6px}
  .zone.mini .lastsets{display:flex;flex-wrap:nowrap;overflow-x:auto;gap:8px;padding:4px 0 2px;
    -webkit-overflow-scrolling:touch;scrollbar-width:none}
  .zone.mini .lastsets::-webkit-scrollbar{display:none}
  .zone.mini .lastset{padding:7px 11px;font-size:12px;flex:none}
  #gearBtn{position:relative}
  #gearBtn.warn::after{content:'';position:absolute;top:4px;right:4px;width:8px;height:8px;
    border-radius:50%;background:var(--record);border:1.5px solid var(--surface)}
  .btn.done{background:var(--accent);border:1px solid var(--accent);color:#fff;font-weight:700;margin-top:12px}
  .btn.done:active{filter:brightness(.9)}
  .brandrow{display:flex;align-items:center;gap:11px;min-width:0}
  .brand{width:24px;height:24px;flex:none;color:var(--chalk)}
  header.live .brand{color:#fff}
  header.live .h-date{color:#fff}
  header.live .h-sub{color:rgba(255,255,255,.85)}
  header.live .streak{color:#fff}
  header.live .icobtn{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.3);color:#fff}
  header.live .icobtn small{color:#fff;opacity:.95}
  header.exmode .h-date{font-size:15px;line-height:1.25;max-width:56vw;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .h-date{font-family:var(--disp);font-weight:700;font-size:19px;letter-spacing:-.01em}
  .h-sub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brandrow>div{min-width:0}
  .hbtns{display:flex;gap:8px;align-items:center}
  .icobtn{
    width:38px;height:38px;border-radius:11px;border:1px solid var(--line);
    background:var(--surface);color:var(--chalk);font-size:16px;cursor:pointer;
    display:grid;place-items:center;
  }
  .streak{font-family:var(--mono);font-size:12px;color:var(--record);font-weight:600;white-space:nowrap;margin-right:2px}
  html{touch-action:manipulation}   /* no double-tap zoom mid-set; pan/pinch unaffected */
  main{padding:18px 18px calc(28px + env(safe-area-inset-bottom))}
  h2{font-family:var(--disp);font-size:12px;letter-spacing:.14em;text-transform:uppercase;
     color:var(--chalk);font-weight:600;margin:30px 0 10px;
     display:flex;align-items:center;gap:8px}
  h2::before{content:'';width:3px;height:12px;border-radius:2px;background:var(--accent);flex:0 0 auto}
  h2.quiet::before{background:var(--line)}
  h2:first-child{margin-top:4px}
  h2 .hi{color:var(--accent);font-weight:700}
  .ibtn{width:20px;height:20px;border-radius:50%;border:0;background:var(--chalk);color:var(--ground);
    font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer;margin-left:6px;
    line-height:20px;padding:0;vertical-align:middle}
  .tipbubble{position:absolute;top:26px;left:0;z-index:15;width:min(260px,72vw);
    background:#16181D;color:#F2F3F6;font-family:var(--mono);font-size:11px;font-weight:400;
    line-height:1.55;letter-spacing:0;text-transform:none;
    padding:10px 12px;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,.35)}
  .tipbubble::before{content:'';position:absolute;top:-5px;left:24px;width:10px;height:10px;
    background:#16181D;transform:rotate(45deg)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
  .row{display:flex;align-items:center;gap:10px}
  .spread{justify-content:space-between}
  .muted{color:var(--muted)} .mono{font-family:var(--mono)}
  .meter{height:6px;border-radius:3px;background:var(--surface2);overflow:hidden;margin-top:12px}
  .meter i{display:block;height:100%;background:var(--accent);transition:width .3s}
  /* chips */
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{font:inherit;font-size:14px;background:var(--surface);color:var(--chalk);
    border:1px solid var(--line);border-radius:999px;padding:9px 15px;cursor:pointer;box-shadow:var(--shadow)}
  .chip .n{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:6px}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .chip.on .n{color:inherit;opacity:.7}
  .chip.due{border-color:var(--accent);color:var(--accent)}
  .chip.due .n{color:var(--accent);opacity:.75}
  /* list items */
  .item{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;
    background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:13px 14px;margin-bottom:8px;color:var(--chalk);font:inherit;text-align:left;cursor:pointer;box-shadow:var(--shadow)}
  .item .sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px}
  .item.todayrow{border-left:3px solid var(--accent);background:color-mix(in srgb,var(--accent) 6%,var(--surface))}
  .item.todayrow.fin{border-left-color:var(--muted)}
  .item.todayrow b::before{content:'● ';color:var(--accent);font-size:9px;vertical-align:1px}
  .item.todayrow.fin b::before{content:'✓ ';color:var(--muted);font-size:11px}
  .item b{font-weight:500}
  .readyrow{display:flex;align-items:center;gap:10px;width:100%;background:none;border:0;
    color:var(--chalk);font:inherit;text-align:left;cursor:pointer;padding:9px 4px;
    border-bottom:1px solid var(--line)}
  .readyrow:last-of-type{border-bottom:0}
  .readyrow .rname{flex:0 0 88px;font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .readyrow .rbar{flex:1;height:8px;border-radius:4px;background:var(--surface2);overflow:hidden}
  .readyrow .rbar i{display:block;height:100%;border-radius:4px;background:var(--faint);transition:width .4s}
  .readyrow .rbar i.due{background:var(--accent)}
  .readyrow .rmeta{flex:none;font-family:var(--mono);font-size:11px;color:var(--chalk)}
  .readyrow .rmeta em{font-style:normal;color:var(--muted)}
  .item[data-ex]>span:first-child{flex:1;min-width:0}
  .item[data-ex]>span:last-child{flex:none;white-space:nowrap;margin-left:auto}
  .partgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .partcard{display:flex;flex-direction:column;align-items:flex-start;gap:1px;
    background:var(--surface);border:1px solid var(--line);border-radius:10px;
    padding:8px 9px;color:var(--chalk);font:inherit;text-align:left;cursor:pointer;box-shadow:var(--shadow)}
  .partcard b{font-weight:600;font-size:13px;line-height:1.25}
  .partcard .ps{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap}
  .partcard.done{border-color:var(--accent)}
  .partcard.done .ps{color:var(--accent)}
  .partcard.hot{border-color:var(--accent)}
  .partcard.hot b{color:var(--accent)}
  .partcard.run{border-color:var(--accent-dim)}
  .partcard.run b{color:var(--accent-dim)}
  .partcard.sel{background:var(--accent);border-color:var(--accent);color:#fff}
  .partcard.sel b,.partcard.sel .ps{color:#fff;opacity:1}
  .partcard.sel .ps{opacity:.8}
  .partcard.dead{opacity:.45}
  .item.dim{opacity:.45}
  .item.logrow{gap:8px;padding:10px 10px 10px 14px}
  .logmain{flex:1;min-width:0;background:none;border:0;color:var(--chalk);font:inherit;text-align:left;cursor:pointer;padding:0}
  .logmain b{font-weight:500}
  .xbtn{flex:0 0 40px;height:40px;border-radius:10px;border:1px solid var(--line);
    background:var(--surface2);color:var(--muted);font-size:14px;cursor:pointer}
  .xbtn:active{border-color:var(--record);color:var(--record)}
  .item.goto{padding:18px 16px;border-left:3px solid var(--accent)}
  .item.goto b{font-size:17px;font-weight:600}
  .item.goto .sub{font-size:11px}
  .item.goto .pr-top{font-size:14px}
  h2.quiet{color:var(--muted);font-weight:500;margin-top:24px}
  .pr-cell{display:flex;flex-direction:column;align-items:flex-end;flex:0 0 auto;font-family:var(--mono)}
  .pr-top{color:var(--chalk);font-size:12px;font-weight:600}
  .pr-side{color:var(--muted);font-size:10px;margin-top:2px;white-space:nowrap}
  .loadline{font-family:var(--mono);font-size:12px;color:var(--muted);
    background:var(--surface2);border-radius:10px;padding:9px 10px;margin-top:-4px;margin-bottom:12px;
    display:flex;align-items:center;gap:10px}
  .ll-viz{flex:0 0 104px;display:flex;justify-content:center}   /* fixed width: text never shifts */
  .ll-text{flex:1;min-width:0}
  .ll-bar{flex:0 0 auto;background:var(--surface);border:1px solid var(--line);color:var(--muted);
    font-family:var(--mono);font-size:11px;line-height:1.35;border-radius:10px;
    padding:8px 12px;min-height:44px;min-width:64px;cursor:pointer;text-align:center}
  .ll-bar b{color:var(--chalk);font-size:12px}
  .ll-bar.save{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
  .barinput{width:100%;background:var(--surface);border:1px solid var(--accent);border-radius:10px;
    color:var(--chalk);font-family:var(--mono);font-weight:700;font-size:18px;padding:9px 11px}
  .barinput:focus{outline:none}
  .barviz{display:flex;align-items:center;gap:2px;height:28px}
  .barviz .bar{height:4px;width:22px;background:var(--muted);border-radius:2px;opacity:.7}
  .barviz .pl{border-radius:2px;background:var(--accent);width:6px}
  /* last session, tappable */
  .zone{background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:13px 14px;margin-top:14px;box-shadow:var(--shadow)}
  .zone.prime{border-color:var(--accent-soft)}
  .zonehead{display:flex;justify-content:space-between;align-items:center;
    font-family:var(--disp);font-size:12px;letter-spacing:.12em;text-transform:uppercase;
    font-weight:600;color:var(--chalk)}
  .zone .lastset,.zone .settile{background:var(--ground)}
  .zone .repgrid button,.zone .fld,.zone .repcustom input{background:var(--ground)}
  .zone .wsel{background:var(--ground)}
  .foldrow{display:flex;justify-content:space-between;align-items:center;width:100%;
    background:none;border:1px dashed var(--line);border-radius:12px;padding:11px 14px;
    color:var(--muted);font:inherit;font-family:var(--mono);font-size:12px;cursor:pointer;margin-top:14px}
  .foldrow .hi{color:var(--accent);font-weight:700}
  .chev{background:none;border:0;color:var(--muted);font-size:12px;cursor:pointer;padding:2px 6px}
  .lastsets{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
  .lastset{display:flex;align-items:baseline;gap:5px;background:var(--surface);
    border:1px solid var(--line);border-radius:10px;padding:10px 12px;cursor:pointer;
    font-family:var(--mono);color:var(--chalk);box-shadow:var(--shadow)}
  .lastset:active{border-color:var(--accent);background:var(--accent-soft)}
  .lastset .ls-w{font-weight:700;font-size:15px}
  .lastset .ls-w small{font-size:10px;color:var(--muted);margin-left:1px}
  .lastset .ls-x{color:var(--muted);font-size:11px}
  .lastset .ls-r{font-weight:700;font-size:15px;color:var(--accent)}
  .repcustom{display:flex;gap:8px;margin-top:8px}
  .repcustom input{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:12px;
    color:var(--chalk);font-family:var(--mono);font-size:16px;padding:12px 14px;min-width:0}
  .repcustom input:focus{outline:none;border-color:var(--accent)}
  /* lift */
  .back{background:none;border:0;color:var(--muted);font:inherit;font-size:13px;padding:0 0 12px;cursor:pointer}
  .exhead{font-family:var(--disp);font-weight:700;font-size:22px;letter-spacing:-.01em;margin:0 0 4px}
  .lastline{font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:2px}
  .lastline b{color:var(--accent);font-weight:500}
  .prline{font-family:var(--mono);font-size:12px;color:var(--chalk);line-height:1.7}
  .prline b{font-weight:700}
  .prline .lbl,.prline .ago{color:var(--muted);font-weight:500}
  .wsel{display:flex;align-items:center;margin:16px 0 12px;
        border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--surface)}
  .wsel button{flex:0 0 76px;height:60px;background:var(--surface2);border:0;color:var(--chalk);
    font-family:var(--mono);font-size:24px;cursor:pointer}
  @keyframes wflash{0%{color:var(--live);transform:scale(1.12)}100%{color:inherit;transform:none}}
  .wsel .val input.wflash{animation:wflash .3s ease}
  .wsel button:active{background:var(--accent-soft)}
  .wsel .val{flex:1;text-align:center;font-family:var(--mono);font-weight:700;font-size:26px}
  .wsel .val input{width:70%;background:none;border:0;color:var(--chalk);text-align:center;
    font-family:var(--mono);font-weight:700;font-size:26px}
  .wsel .val input:focus{outline:none}
  .wsel .unit{font-size:12px;color:var(--muted)}
  .repgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
  .repgrid button{aspect-ratio:1/1;background:var(--surface);border:1px solid var(--line);border-radius:10px;
    color:var(--chalk);font-family:var(--mono);font-weight:700;font-size:16px;cursor:pointer;box-shadow:var(--shadow)}
  .repgrid button:active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .sets{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px;min-height:4px}
  .settile{display:flex;align-items:baseline;gap:6px;padding:9px 11px;border-radius:10px;
    background:var(--surface2);border:1px solid var(--accent-soft);font-family:var(--mono);font-size:14px;cursor:pointer}
  .settile .w{font-weight:700}
  .settile .x{color:var(--muted);font-size:11px}
  .settile.pr{border-color:var(--record)}
  .settile.pr .w{color:var(--record)}
  .tot{margin-top:14px;padding-top:12px;border-top:1px dashed var(--line);
    display:flex;justify-content:space-between;font-family:var(--mono);font-size:13px;color:var(--muted)}
  .tot b{color:var(--chalk);font-weight:700}
  .delta.up{color:var(--accent)} .delta.down{color:var(--record)}
  .runrow{display:flex;gap:10px;margin:14px 0}
  .fld{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
  .fld label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  .fld input{width:100%;background:none;border:0;color:var(--chalk);font-family:var(--mono);font-weight:700;font-size:22px}
  .fld input:focus{outline:none}
  .fld.text input{font-size:14px;font-weight:500;font-family:var(--body)}
  .btn{width:100%;padding:15px;border-radius:12px;border:0;background:var(--accent);color:#fff;
    font:inherit;font-weight:700;font-size:15px;cursor:pointer;margin-top:4px}
  .btn.ghost{background:none;border:1px solid var(--line);color:var(--muted);font-weight:500}
  /* stats */
  .rhythm .big{font-family:var(--mono);font-size:30px;font-weight:700;line-height:1}
  .rhythm .big.ok{font-size:20px;color:var(--accent)}
  .rhythm .unit{font-family:var(--mono);font-size:12px;color:var(--muted);margin-left:4px}
  .strip{display:flex;gap:3px;margin-top:14px}
  .strip i{flex:1;height:22px;border-radius:3px;background:var(--surface2);border:1px solid var(--line)}
  .strip i.on{background:var(--accent);border-color:var(--accent)}
  .strip i.now{outline:2px solid var(--chalk);outline-offset:1px}
  .vs{margin-top:14px;padding-top:12px;border-top:1px dashed var(--line)}
  .vsrow{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .vsrow .y{font-family:var(--mono);font-size:11px;color:var(--muted);flex:0 0 34px}
  .vsrow .bar{flex:1;height:8px;border-radius:4px;background:var(--surface2);overflow:hidden}
  .vsrow .bar i{display:block;height:100%}
  .vsrow .p{font-family:var(--mono);font-size:11px;flex:0 0 32px;text-align:right}
  .kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow)}
  .kpi .v{font-family:var(--mono);font-weight:700;font-size:24px;line-height:1.15}
  .kpis .kpi:first-child .v{font-size:30px}
  .kpis .kpi:nth-child(3):last-child{grid-column:1/-1}
  .kpi .l{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:3px}
  .kpi .d{font-family:var(--mono);font-size:10px;margin-top:3px}
  .kpi.accent .v{color:var(--accent)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  td,th{padding:8px 6px;border-bottom:1px solid var(--line);text-align:left}

   (…/rest/v1), a trailing slash. Reduce any of them to the bare origin, because every
   endpoint path (/auth/v1/…, /rest/v1/…) is appended by us. */
function normUrl(raw){
  let u=(raw||'').trim();
  if(!u) return '';
  if(!/^https?:\/\//i.test(u)) u='https://'+u;
  try{ return new URL(u).origin; }
  catch(e){ return u.replace(/\/.*$/,'').replace(/\/+$/,''); }
}

});

/* after Google redirects back, the tokens arrive in the URL hash */
async function captureOAuth(){
  if(typeof location==='undefined') return;
  const err=new URLSearchParams(location.search).get('error_description')
        || new URLSearchParams(location.hash.slice(1)).get('error_description');
  if(err){
    history.replaceState(null,'',location.pathname);
    return toast('Sign-in failed: '+decodeURIComponent(err).slice(0,80));
  }
  if(!location.hash.includes('access_token')) return;
  const p=new URLSearchParams(location.hash.slice(1));
  const at=p.get('access_token'), rt=p.get('refresh_token'), ei=+(p.get('expires_in')||3600);
  history.replaceState(null,'',location.pathname+location.search);
  if(!at) return;
  let user={};
  try{
    const r=await fetch(cloudCfg().url+'/auth/v1/user',{headers:{apikey:cloudCfg().anon,Authorization:'Bearer '+at}});
    if(r.ok){const u=await r.json(); user={id:u.id,email:u.email};}
  }catch(e){}
  await saveSession({access_token:at,refresh_token:rt,expires_at:Date.now()+ei*1000,user});
  toast('Signed in'+(user.email?' as '+user.email:''));
  cloudPull();
}
async function freshToken(){
  if(!session) return null;
  if(Date.now()<session.expires_at-60000) return session.access_token;
  try{
    const r=await fetch(cloudCfg().url+'/auth/v1/token?grant_type=refresh_token',{
      method:'POST',headers:{apikey:cloudCfg().anon,'Content-Type':'application/json'},
      body:JSON.stringify({refresh_token:session.refresh_token})});
    if(!r.ok){await saveSession(null);syncState('signedout');
      toast('Cloud sign-in expired — open ⚙ to sign in again');return null;}
    const j=await r.json();
    await saveSession({access_token:j.access_token,refresh_token:j.refresh_token,
      expires_at:Date.now()+j.expires_in*1000,user:session.user});
    return j.access_token;
  }catch(e){return null;}
}

/* one row per user: the whole app state as a document */
/* Push REPLACES the whole cloud document, so it is only ever safe after this
   device has merged the cloud into itself. pulledOK gates every push; a fresh
   install (or any device that hasn't pulled yet this boot) physically cannot
   overwrite the cloud with an empty or partial copy. This is the bug that ate
   data on reinstall (v2.09 and earlier). */
let SYNC='';
function syncState(s){
  if(s===SYNC) return; SYNC=s;
  const g=document.getElementById('gearBtn'); if(!g) return;
  g.classList.toggle('warn', s==='signedout'||s==='error');
  g.title = s==='signedout' ? 'Not syncing — sign in again'
          : s==='error'     ? 'Cloud sync failing — data is safe on this device'
          : 'Settings, account & sync';
}
let pulledOK=false;
async function cloudPull(){
  const tok=await freshToken(); if(!tok) return;
  try{
    const r=await fetch(cloudCfg().url+'/rest/v1/app_state?select=doc,updated_at',{
      headers:{apikey:cloudCfg().anon,Authorization:'Bearer '+tok}});
    if(!r.ok) return toast('Cloud pull failed ('+r.status+')');
    const rows=await r.json();
    if(!rows.length){ pulledOK=true; cloudPush(); return; }   // cloud confirmed empty: safe to seed
    const remote=rows[0].doc||{};
    let merged=0;
    for(const [d,rv] of Object.entries(remote.days||{})){
      const lv=DB.days[d];
      if(!lv){DB.days[d]=rv;merged++;continue;}
      const seen=new Set(lv.w.map(s=>JSON.stringify(s)));
      for(const s of rv.w||[]) if(!seen.has(JSON.stringify(s))){lv.w.push(s);merged++;}
    }
    if(remote.settings && (remote.settingsAt||0) > (DB.settingsAt||0)){
      DB.settings={...DB.settings,...remote.settings};
      DB.settingsAt=remote.settingsAt;
      applyTheme();
    }
    DB.settings.lastCloud=Date.now();
    _avgVol=null;
    pulledOK=true;                                        // local is now a superset of the cloud
    save(); render();
    if(merged) toast('Cloud: merged '+merged+' item(s)');
  }catch(e){}
}
/* ---- history archive (v2.13, stage 1 of moving data out of index.html) ----
   The full imported history (918 days back to 2021-12-13) converted to the
   app's day format and carried in every cloud push under doc.archive. The app
   still RENDERS from the embedded seed for now; this puts the raw data where
   it belongs — your Supabase row — and is the substrate v3.0 will switch to. */
let _archive=null;
function buildArchive(){
  if(_archive) return _archive;
  const days={};
  let rows=0, km=0;
  for(const [d,list] of Object.entries(SEED.sessions)){
    days[d]={w:list.map(r=>{
      const s={part:r[0],ex:r[1],w:r[2],reps:r[3]||[]};
      if(r[4]!=null) s.mins=r[4];
      if(r[5]!=null) s.secs=r[5];
      if(r[1]==='Run') km+=r[2];
      rows++; return s;
    })};
  }
  _archive={v:1, from:SEED.totals.first, to:SEED.totals.last,
            daysN:Object.keys(days).length, rows, km:Math.round(km*10)/10, days};
  return _archive;
}
let cloudTimer=null;
async function cloudPushNow(keepalive){
  const tok=await freshToken(); if(!tok){ syncState('signedout'); return false; }
  if(!pulledOK) return false;   // a device that hasn't restored yet never overwrites the cloud
  try{
    const doc={days:DB.days, settings:DB.settings, settingsAt:DB.settingsAt||Date.now(), suggest:DB.suggest, archive:buildArchive()};
    const r=await fetch(cloudCfg().url+'/rest/v1/app_state',{
      method:'POST',
      keepalive:!!keepalive,     // lets the request finish even as iOS backgrounds the app
      headers:{apikey:cloudCfg().anon,Authorization:'Bearer '+tok,'Content-Type':'application/json',
               Prefer:'resolution=merge-duplicates'},
      body:JSON.stringify({user_id:session.user.id, doc, updated_at:new Date().toISOString()})});
    if(r.ok){ DB.settings.lastCloud=Date.now(); syncState('ok'); return true; }
    syncState('error'); return false;
  }catch(e){ syncState('error'); return false; }
}
function cloudPush(){
  clearTimeout(cloudTimer);
  cloudTimer=setTimeout(cloudPushNow, 1200);
}

/* ---------- storage adapter: claude.ai artifact storage -> localStorage (browser / iOS build) ---------- */
const store = {
  async get(k){
    try{ if(typeof window!=='undefined' && window.storage){ const r=await window.storage.get(k); return r?r.value:null; } }catch(e){}
    try{ return localStorage.getItem(k); }catch(e){ return null; }
  },
  async set(k,v){
    try{ if(typeof window!=='undefined' && window.storage){ await window.storage.set(k,v); return true; } }catch(e){}
    try{ localStorage.setItem(k,v); return true; }catch(e){ return false; }
  }
};
async function load(){
  const raw = await store.get(KEY);
  if(raw){ try{ const d=JSON.parse(raw); DB={...DB,...d, settings:{...DB.settings,...(d.settings||{}), gh:{...DB.settings.gh,...((d.settings||{}).gh||{})}}}; }catch(e){} }
  if(!DB.days) DB.days={};
  applyTheme();
}
let saveTimer=null, saveDirty=false;
function save(markSettings){
  if(markSettings) DB.settingsAt=Date.now();
  saveDirty=true;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    saveDirty=false;
    const ok = await store.set(KEY, JSON.stringify(DB));
    if(!ok){ saveDirty=true; toast('Not saved — storage unavailable'); }
  },350);
  if(session) cloudPush();
}
/* iOS kills a home-screen app the instant it's swiped away — a debounced save
   still in its 350ms window would be lost (this is why the theme "reset").
   localStorage.setItem is synchronous, so it completes even during pagehide. */
function dailyBackup(){
  try{
    const k='showup:bak:'+todayISO;
    if(localStorage.getItem(k)) return;
    localStorage.setItem(k, JSON.stringify({days:DB.days,settings:DB.settings,settingsAt:DB.settingsAt}));
    Object.keys(localStorage).filter(x=>x.startsWith('showup:bak:')).sort().slice(0,-5)
      .forEach(x=>localStorage.removeItem(x));            // keep the last 5 days
  }catch(e){}
}
function flushSave(){
  if(session) cloudPushNow(true);       // phone → cloud on every background/close (keepalive)
  if(!saveDirty) return;
  clearTimeout(saveTimer); saveDirty=false;
  try{ localStorage.setItem(KEY, JSON.stringify(DB)); }catch(e){}
  store.set(KEY, JSON.stringify(DB));   // async layer too, if it gets the chance
}

/* ---------- pull to refresh ----------
   Hold the page down from the very top and let go: pending saves flush, the
   service worker checks for a newer app version, then the app reloads (and the
   boot sequence cloud-pulls). Pulls that start inside a zoomable chart are
   ignored so the gesture never fights pinch-zoom. */
(()=>{
  const el=document.getElementById('ptr'); if(!el) return;
  const THRESH=72, DRAG=0.5;
  let y0=null, pulling=false, dist=0, fired=false;
  addEventListener('touchstart',e=>{
    if(fired) return;
    if(scrollY>0){y0=null;return;}
    if(e.target.closest('[data-zoom]')){y0=null;return;}
    y0=e.touches[0].clientY; pulling=false; dist=0;
  },{passive:true});
  addEventListener('touchmove',e=>{
    if(y0===null||fired) return;
    const dy=e.touches[0].clientY-y0;
    if(!pulling){ if(dy>8&&scrollY<=0) pulling=true; else if(dy<0){y0=null;return;} else return; }
    e.preventDefault();
    dist=Math.max(0,dy)*DRAG;
    el.style.transition='none';
    el.style.transform=`translateY(${Math.min(dist,110)-58}px)`;
    el.classList.toggle('arm',dist>=THRESH);
  },{passive:false});
  const settle=()=>{
    el.style.transition='transform .25s cubic-bezier(.2,.8,.25,1)';
    el.style.transform='translateY(-58px)';
    el.classList.remove('arm');
  };
  addEventListener('touchend',async()=>{
    if(y0===null||fired) return;
    const go=pulling&&dist>=THRESH;
    y0=null; pulling=false;
    if(!go){ settle(); return; }
    fired=true;
    el.classList.remove('arm'); el.classList.add('spin');
    el.style.transition='transform .2s'; el.style.transform='translateY(0px)';
    try{ flushSave(); }catch(e){}
    try{ if(session) await cloudPushNow(); }catch(e){}    // phone → cloud, synchronously
    try{ const reg=await navigator.serviceWorker.getRegistration(); if(reg) await reg.update(); }catch(e){}
    setTimeout(()=>location.reload(),150);
  },{passive:true});
})();

/* ---------- helpers ---------- */
const $=s=>document.querySelector(s);
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2000);}
function fmt(n){return n.toLocaleString('en-US');}
function pretty(d){const [y,m,dd]=d.split('-').map(Number);return new Date(y,m-1,dd).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function md(d){const [y,m,dd]=d.split('-').map(Number);return `${m}/${dd}/${y}`;}            // 4/26/2024
function wd(d){const [y,m,dd]=d.split('-').map(Number);

function doy(iso){const [y,m,d]=iso.split('-').map(Number);return Math.round((Date.UTC(y,m-1,d)-Date.UTC(y,0,1))/864e5)+1;}
function volOf(s){return s.ex==='Run'?0:s.w*s.reps.reduce((a,b)=>a+b,0);}
/* average per-session load for a part, across ALL history (seed + app days,
   excluding today — today is the thing being measured). Runs measure km. */
let _avgVol=null;
function avgSessionVol(part){
  if(!_avgVol){
    _avgVol={};
    const acc={};
    const feed=per=>{ for(const [p,v] of Object.entries(per)){ const a=acc[p]=acc[p]||{s:0,n:0}; a.s+=v; a.n++; } };
    for(const rows of Object.values(SEED.sessions)){
      const per={};
      for(const r of rows){
        const v=r[1]==='Run'? r[2] : r[2]*(r[3]||[]).reduce((a,b)=>a+b,0);
        per[r[0]]=(per[r[0]]||0)+v;
      }
      feed(per);
    }
    for(const [d,day] of Object.entries(DB.days)){
      if(d<=SEED.totals.last||d===todayISO) continue;
      const per={};
      for(const s of day.w){ const v=s.ex==='Run'?s.w:volOf(s); per[s.part]=(per[s.part]||0)+v; }
      feed(per);
    }
    for(const [p,a] of Object.entries(acc)) _avgVol[p]=a.s/a.n;
  }
  return _avgVol[part]||0;
}

/* weights are always STORED in kg; the unit setting only changes what you see and type */
const LB=2.20462, MI=0.621371;
const isLb=()=>DB.settings.unit==='lb';       // 'lb' == imperial, 'kg' == metric
const U=()=>isLb()?'lb':'kg';
const DU=()=>isLb()?'mi':'km';                 // distance unit
const toD=km=>isLb()?km*MI:km;                 // stored km -> display
const fromD=v=>isLb()?v/MI:v;                  // display -> stored km
const dDisp=km=>(Math.round(toD(km)*100)/100).toFixed(2);
const toU=kg=>isLb()?kg*LB:kg;                       // kg -> display
const toKg=v=>isLb()?v/LB:v;                         // display -> kg
const wDisp=kg=>{const v=toU(kg);return (Math.round(v*10)/10).toString().replace(/\.0$/,'');};
const vDisp=kg=>fmt(Math.round(toU(kg)));            // volume
const STEP=()=>isLb()?5:2.5;

/* --- bar + plate math ---------------------------------------------------
   Weights are stored as the TOTAL on the movement (bar included), matching
   how the sheet was kept. Bar weights are editable in Settings.          */
const barKg=ex=>{
  const per=(DB.settings.barByEx||{})[ex];      // per-exercise override, once you set it
  if(per!=null) return per;
  const e=equipOf(ex);
  if(e==='barbell') return DB.settings.barKg ?? 20;
  if(e==='smith')   return DB.settings.smithKg ?? 20;
  return 0;
};
const usesPlates=ex=>['barbell','smith'].includes(equipOf(ex));
const agoStr=d=>{const n=daysAgo(d);return n<=0?'today':n===1?'yesterday':`${n} days ago`;};

/* ---- session flow (v2.09): a workout has a beginning and an end ----------
   Three levels, each with open/complete state for TODAY:
     level 0  workout   — open from the first set until "Complete workout"
     level 1  body part — open while any of its exercises are open
     level 2  exercise  — open from its first set until "Complete <exercise>"
   Logging a new set to anything completed reopens it (and its parents). */
function dayMeta(){const t=day(todayISO);t.doneEx=t.doneEx||[];t.donePart=t.donePart||[];t.sugX=t.sugX||{};return t;}
const isLive =()=>{const t=day(todayISO);return t.w.length>0&&!t.doneAll;};
const exOpen =ex=>{const t=dayMeta();return t.w.some(s=>s.ex===ex)&&!t.doneEx.includes(ex);};
const partOpen=p =>{const t=dayMeta();return t.w.some(s=>s.part===p&&!t.doneEx.includes(s.ex));};
let lastSetAt=null;
function reanchorRest(){
  const t=day(todayISO);
  const times=t.w.map(s=>s.at||0).filter(Boolean);
  lastSetAt=times.length?Math.max(...times):null;
  t.lastAt=lastSetAt;
  tickRest();
}
function reopen(ex,part){
  const t=dayMeta();
  t.doneEx=t.doneEx.filter(x=>x!==ex);
  t.donePart=t.donePart.filter(x=>x!==part);
  t.doneAll=false;
  lastSetAt=Date.now(); t.lastAt=lastSetAt;
}
const isBody=ex=>equipOf(ex)==='body';
const snapW=kg=>{const s=STEP();const u=toU(kg);return toKg(Math.round(u/s)*s);}   // clean stepper multiples
function saveExW(ex,kg){ if(!ex) return; DB.settings.exW=DB.settings.exW||{}; DB.settings.exW[ex]=kg; }
const wLabel=(ex,kg)=>isBody(ex)&&kg<=0.01?'BW':`${wDisp(kg)}`;   // free-weight moves read as bodyweight
const PLATES_KG=[25,20,15,10,5,2.5,1.25];
const PLATES_LB=[45,35,25,10,5,2.5];
/* greedy plate breakdown for ONE side */
function plates(perSideKg){
  const unit=isLb()?PLATES_LB:PLATES_KG;
  let left=isLb()?perSideKg*LB:perSideKg;
  const out=[];
  for(const p of unit){
    while(left>=p-0.01){ out.push(p); left-=p; if(out.length>8) return out; }
  }
  return out;
}
/* one human-readable line: what's actually on the bar */
function loadLine(ex,totalKg){
  if(!usesPlates(ex)) {
    const e=equipOf(ex);
    if(e==='dumbbell') return `${wDisp(totalKg)} ${U()} per hand`;
    if(e==='body')     return totalKg>0 ? `bodyweight + ${wDisp(totalKg)} ${U()}` : 'bodyweight';
    return '';
  }
  const bar=barKg(ex);
  const perSide=(totalKg-bar)/2;
  if(perSide<=0.01) return `empty bar · ${wDisp(bar)} ${U()}`;
  return `${wDisp(bar)} ${U()} bar + ${wDisp(perSide)} ${U()} per side`;
}

/* every workout DATE ever: seed history + anything logged in the app */
function workoutDates(){
  const s=new Set(SEED.dates);
  for(const [d,v] of Object.entries(DB.days)) if(v.w&&v.w.length) s.add(d);
  return s;
}
/* recent sessions with full detail (seed last 120d + user) */
function allDays(){
  const out={};
  for(const [d,list] of Object.entries(SEED.sessions))
    out[d]=list.map(([part,ex,w,reps,mins,secs])=>({part,ex,w,reps,mins,secs}));
  for(const [d,v] of Object.entries(DB.days))
    if(v.w&&v.w.length) out[d]=(out[d]||[]).concat(v.w);
  return out;
}
function lastFor(ex){
  const mine=Object.entries(DB.days).filter(([d,v])=>v.w.some(s=>s.ex===ex)).sort((a,b)=>a[0]<b[0]?1:-1)[0];
  const seed=SEED.last[ex];
  if(mine&&(!seed||mine[0]>seed.d))
    return {d:mine[0],sets:mine[1].w.filter(s=>s.ex===ex).map(s=>[s.w,s.reps,s.mins,s.secs])};
  return seed||null;
}
function prFor(ex){
  const p=SEED.pr[ex]?{...SEED.pr[ex]}:{mw:0,mwr:0,mwd:'',bv:0,bvr:0,bvw:0,bvd:''};
  for(const [d,v] of Object.entries(DB.days))
    for(const s of v.w){
      if(s.ex!==ex||!s.reps.length) continue;
      const mr=Math.max(...s.reps);
      if(s.w>p.mw||(s.w===p.mw&&mr>p.mwr)){p.mw=s.w;p.mwr=mr;p.mwd=d;}
      for(const r of s.reps)                       // best single set: weight × reps, one set
        if(s.w*r>p.bv){p.bv=s.w*r;p.bvr=r;p.bvw=s.w;p.bvd=d;}
    }
  return p;
}
function partLastSeen(){
  const seen={...SEED.partLast};
  for(const [d,v] of Object.entries(DB.days))
    for(const s of v.w)
      if(s.part&&(!seen[s.part]||d>seen[s.part])) seen[s.part]=d;
  return seen;
}
/* day -> Set(parts), last 365d, seed + logged */
function dayParts(){
  const m={};
  for(const [p,list] of Object.entries(SEED.partDays||{}))
    for(const d of list) (m[d]=m[d]||new Set()).add(p);
  for(const [d,v] of Object.entries(DB.days))
    for(const s of v.w) if(s.part) (m[d]=m[d]||new Set()).add(s.part);
  return m;
}
function median(a){ if(!a.length) return 0; const s=[...a].sort((x,y)=>x-y); const i=s.length>>1;
  return s.length%2 ? s[i] : (s[i-1]+s[i])/2; }

/* What to train next, learned from history:
   - a part counts as "live" only if trained >=8 times in the last year
   - readiness = days since / your own median gap for that part
   - a part you almost always train alone is a MAIN day; one you only ever
     tack on to another part (Biceps) is an ADD-ON
   - Run is its own thing (near-daily), never the headline pick            */
function trainingPlan(){
  const dp=dayParts();
  const byPart={};
  for(const [d,set] of Object.entries(dp))
    for(const p of set) (byPart[p]=byPart[p]||[]).push(d);

  const info={};
  for(const [p,days] of Object.entries(byPart)){
    days.sort();
    const gaps=[];
    for(let i=1;i<days.length;i++) gaps.push(daysBetween(days[i-1],days[i]));
    const lifts = days.filter(d=>{
      const others=[...dp[d]].filter(x=>x!=='Run'&&x!==p);
      return others.length===0;
    }).length;
    const liftDays = days.filter(d=>p!=='Run').length || days.length;
    info[p]={
      days:days.length,
      last:days[days.length-1],
      since:daysAgo(days[days.length-1]),
      gap:Math.max(1,median(gaps)||7),
      soloRate: p==='Run' ? 1 : lifts/liftDays,
      live: days.length>=8
    };
  }
  for(const p of Object.keys(SEED.catalog))
    if(!info[p]) info[p]={days:0,last:SEED.partLast[p]||null,since:SEED.partLast[p]?daysAgo(SEED.partLast[p]):999,gap:7,soloRate:0,live:false};

  const score=p=>info[p].since/info[p].gap;
  const live=Object.keys(info).filter(p=>info[p].live&&p!=='Run');
  const mains=live.filter(p=>info[p].soloRate>=0.4).sort((a,b)=>score(b)-score(a));
  const addons=live.filter(p=>info[p].soloRate<0.4).sort((a,b)=>score(b)-score(a));
  const dormant=Object.keys(SEED.catalog).filter(p=>p!=='Run'&&!info[p].live);

  const pick=mains[0]||null;
  // an add-on is worth suggesting only if it's overdue on its own cycle
  const addon=addons.find(p=>score(p)>=1)||null;
  const run=info['Run']||null;
  return {info,score,mains,addons,dormant,pick,addon,run};
}
function streakFrom(dates, endISO){
  let n=0, d=new Date(endISO+'T00:00');
  while(dates.has(d.toLocaleDateString('en-CA'))){n++;d.setDate(d.getDate()-1);}
  return n;
}
function currentStreak(){
  const dates=workoutDates();
  const t=streakFrom(dates,todayISO);
  if(t) return t;
  const y=new Date(todayISO+'T00:00');y.setDate(y.getDate()-1);
  return streakFrom(dates,y.toLocaleDateString('en-CA'));   // today just hasn't happened yet
}
function longestStreak(){
  const arr=[...workoutDates()].sort();
  let best=0,run=0,prev=null;
  for(const d of arr){
    run=(prev&&daysBetween(prev,d)===1)?run+1:1;
    if(run>best)best=run; prev=d;
  }
  return best;
}
function daysBetween(a,b){return Math.round((new Date(b+'T00:00')-new Date(a+'T00:00'))/864e5);}

/* year-over-year cumulative consistency: workout days so far / days elapsed  (the Dashboard bottom chart) */
function yearCurves(){
  const dates=workoutDates();
  const perYear={};
  for(const iso of dates){const y=iso.slice(0,4);(perYear[y]=perYear[y]||[]).push(doy(iso));}
  const out={};
  for(const [y,list] of Object.entries(perYear)){
    list.sort((a,b)=>a-b);
    const end = y===thisYear ? doy(todayISO) : ((+y%4===0)?366:365);
    const curve=new Float32Array(end); let c=0,i=0;
    for(let d=1;d<=end;d++){
      while(i<list.length&&list[i]<=d){c++;i++;}
      curve[d-1]=c/d;
    }
    out[y]={curve,days:list.length,end};
  }
  return out;
}

/* How the year is actually going: rest days, the current gap, and last year at
   this exact point in the calendar. */
function rhythm(){
  const dates=workoutDates();
  const elapsed=doy(todayISO);
  const trainedYTD=[...dates].filter(d=>d.startsWith(thisYear)).length;
  const restYTD=elapsed-trainedYTD;
  const curves=yearCurves();
  const ly=String(+thisYear-1);
  const lyPct=curves[ly]?curves[ly].curve[Math.min(elapsed,curves[ly].end)-1]:null;
  const pct=trainedYTD/elapsed;
  // current gap: days since the last workout (0 if trained today)
  let gap=0;
  const d=new Date(todayISO+'T00:00');
  while(!dates.has(d.toLocaleDateString('en-CA'))){ gap++; d.setDate(d.getDate()-1); if(gap>400) break; }
  // last 21 days
  const strip=[];
  for(let i=20;i>=0;i--){
    const c=new Date(todayISO+'T00:00'); c.setDate(c.getDate()-i);
    const iso=c.toLocaleDateString('en-CA');
    strip.push({iso, on:dates.has(iso), today:iso===todayISO});
  }
  const rest21=strip.filter(s=>!s.on).length;
  return {pct,lyPct,ly,trainedYTD,restYTD,elapsed,gap,strip,rest21};
}
function rhythmCard(){
  const r=rhythm(), ly=r.ly;

  const delta=lyN!=null?pctN-lyN:null;
  const lead = r.gap===0
    ? `<b class="big ok">Trained today</b>`

  let h=`<div class="card rhythm">

      </div>
    </div>

  r.strip.forEach(s=>{

  });
  h+=`</div>
    <div class="mono muted" style="font-size:10px;display:flex;justify-content:space-between;margin-top:4px">
      <span>3 weeks ago</span><span>today</span></div>`;
  if(lyN!=null){
    const w1=Math.max(2,pctN), w2=Math.max(2,lyN);
    h+=`<div class="vs">
          <div class="vsrow"><span class="y">${thisYear}</span>
            <span class="bar"><i style="width:${w1}%;background:var(--accent)"></i></span>
            <span class="p">${pctN}%</span></div>
          <div class="vsrow"><span class="y">${ly}</span>

            <span class="muted">· ${r.trainedYTD} trained / ${r.restYTD} rested of ${r.elapsed} days</span></div>

/* ---------- Lift ---------- */
function exLastFor(ex){
  let last=SEED.exLast[ex]||null;
  for(const [d,v] of Object.entries(DB.days))
    if(v.w.some(s=>s.ex===ex) && (!last||d>last)) last=d;
  return last;
}
/* sessions in the last 365 days — how much of a staple this lift is */
function exFreq(ex){
  const cut=new Date(); cut.setDate(cut.getDate()-365);
  const cISO=cut.toLocaleDateString('en-CA');
  let n=SEED.exFreq[ex]||0;                       // true count from the imported history
  for(const [d,v] of Object.entries(DB.days))     // plus anything logged in the app since
    if(d>=cISO && d>SEED.totals.last && v.w.some(s=>s.ex===ex)) n++;
  return n;
}
/* Go-to = a lift you're actually running right now: done in the last 60 days,
   and more than a one-off. Everything else with history is Occasional.        */
function exTier(ex){
  const ov=(DB.settings.tierOv||{})[ex];
  if(ov==='core') return 'goto';
  if(ov==='other') return exLastFor(ex)?'sometimes':'new';
  const last=exLastFor(ex);
  if(!last) return 'new';
  return (daysAgo(last)<=60 && exFreq(ex)>=3) ? 'goto' : 'sometimes';
}

/* progression chart: seed's last 14 sessions + everything app-logged since.
   Red dots are TRUE PRs — top set that tied or beat the all-time max at the time. */
function progChart(ex){
  const pts=histFor(ex);
  if(pts.length<3) return '';
  const body=isBody(ex)&&pts.every(p=>p.w<=0.01);
  const vals=pts.map(p=>body?p.r:p.w);
  const lo=Math.min(...vals), hi=Math.max(...vals);
  const span=Math.max(hi-lo, body?2:toKg(STEP()*2));
  const top=hi+span*0.18, base=Math.max(0,lo-span*0.18);
  const X=i=>16+i*(298/Math.max(1,pts.length-1));
  const Y=v=>104-(v-base)/(top-base)*84;
  let runMax=0, poly='', dots='';
  const allMax=body?Math.max(...vals):prFor(ex).mw;
  pts.forEach((p,i)=>{
    const v=vals[i], x=X(i), y=Y(v);
    poly+=`${x.toFixed(1)},${y.toFixed(1)} `;
    const pr=v>=allMax&&v>runMax;                    // first time hitting the all-time top
    if(v>runMax) runMax=v;
    const last=i===pts.length-1;
    dots+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${pr?3.4:last?3:2}" fill="${pr?'var(--record)':'var(--accent)'}" ${last&&!pr?'class="beacon"':''}></circle>`;
    if(pr||last||i===0)
      dots+=`<text x="${x.toFixed(1)}" y="${(y-7).toFixed(1)}" text-anchor="middle" font-family="var(--mono)" font-size="7" fill="${pr?'var(--record)':'var(--muted)'}">${body?v+'r':wDisp(v)}</text>`;
  });
  const d0=pts[0].d, d1=pts[pts.length-1].d;
  return `<h2>Progression</h2><div class="card">
    <svg viewBox="0 0 330 122" style="width:100%;height:auto">
      <polyline points="${poly.trim()}" fill="none" stroke="var(--accent)" stroke-width="1.4" stroke-linejoin="round" opacity=".8"></polyline>
      ${dots}
      <text x="16" y="118" font-family="var(--mono)" font-size="7" fill="var(--muted)">${md(d0)}</text>
      <text x="314" y="118" text-anchor="end" font-family="var(--mono)" font-size="7" fill="var(--muted)">${md(d1)}</text>
    </svg>
    <div class="tot"><span>Top ${body?'reps':'set'} per session · last ${pts.length}</span>
      <span><b style="color:var(--record)">●</b> all-time best${body?'':` ${wDisp(allMax)} ${U()}`}</span></div>
  </div>`;
}
/* last ~14 sessions of top-set weight, as a tiny sparkline */
function histFor(ex){
  const pts=(SEED.hist[ex]||[]).map(([d,w,r])=>({d,w,r}));
  for(const [d,v] of Object.entries(DB.days)){
    const sets=v.w.filter(s=>s.ex===ex);
    if(!sets.length) continue;
    const w=Math.max(...sets.map(s=>s.w));
    const r=Math.max(0,...sets.flatMap(s=>s.reps));
    const i=pts.findIndex(p=>p.d===d);
    if(i>=0) pts[i]={d,w,r}; else pts.push({d,w,r});
  }
  return pts.sort((a,b)=>a.d.localeCompare(b.d)).slice(-14);
}

      for(const [ex,list] of Object.entries(byEx)){

        const sub=isRun
          ?list.map(s=>`${dDisp(s.w)} ${DU()} · ${s.mins||0}'${String(s.secs||0).padStart(2,'0')}"`).join('  ')
          :list.map(s=>`${wDisp(s.w)}${U()} × ${s.reps.join(',')}`).join('   ');
        const v=list.reduce((a,s)=>a+volOf(s),0);
        const exDone=!exOpen(ex);
        h+=`<div class="item logrow todayrow ${exDone?'fin':''}">
              <button class="logmain" data-ex="${ex}" data-part="${lift.part}">
                <b>${ex}</b><div class="sub">${sub}</div>
              </button>
              <span class="mono muted" style="font-size:12px">${v?vDisp(v)+' '+U():''}</span>
              <button class="xbtn" data-dropex="${ex}" aria-label="Remove ${ex} from today">✕</button>
            </div>`;
      }
      h+=`${undoStack.length?`<button class="btn ghost" id="undoBtn">↺ Undo — ${undoStack[undoStack.length-1].label}</button>`:''}
`;
      const usual=avgSessionVol(lift.part);
      if(usual>0){
        const isRunPart=lift.part==='Run';
        const cur=mine.reduce((a,s)=>a+(s.ex==='Run'?s.w:volOf(s)),0);
        const pct=Math.round(cur/usual*100);
        const disp=v=>isRunPart?`${dDisp(v)} ${DU()}`:`${vDisp(v)} ${U()}`;
        h+=`<div class="card" style="margin-top:10px;padding:12px 14px">
              <div class="row spread" style="margin-bottom:8px">
                <span class="mono muted" style="font-size:11px;letter-spacing:.05em;text-transform:uppercase">Today vs your usual ${lift.part} session</span>
                <span class="mono" style="font-weight:700;color:${pct>=100?'var(--accent)':'var(--chalk)'}">${pct}%</span>
              </div>
              <div class="smeter"><i style="width:${Math.min(100,pct)}%" class="${pct>=100?'over':''}"></i></div>
              <div class="tot"><span><b>${disp(cur)}</b> today</span><span>usual ≈ ${disp(usual)}</span></div>
            </div>`;
      }
      if(partOpen(lift.part)) h+=`<button class="btn done" id="donePartBtn">✓ Complete ${lift.part}</button>`;
    }

    // exercises, split by how much of a staple they are for you.
    // Anything currently OPEN today already sits in the "· today" list above —
    // it only returns to its tier once you complete it.
    const openSet=new Set(t.w.filter(s=>s.part===lift.part&&!dayMeta().doneEx.includes(s.ex)).map(s=>s.ex));
    const list=catFor(lift.part).map(ex=>({ex,last:exLastFor(ex),tier:exTier(ex),freq:exFreq(ex)}))
      .filter(x=>!openSet.has(x.ex));
    const row=({ex,last,freq},big)=>{
      const p=prFor(ex);
      const when=last?(daysAgo(last)===0?'✓ done today':daysAgo(last)+'d ago'):'never logged';
      const meta=big?`${when} · ${freq}× this year`:when;
      const side=(p.mw&&usesPlates(ex))?`${wDisp((p.mw-barKg(ex))/2)}${U()} / side`:'';
      const mine=!!customs()[ex];
      const eq=EQUIP_LABEL[equipOf(ex)]||'';
      return `<div class="item logrow ${big?'goto':''} ${last?'':'dim'}" style="${big?'':'padding:10px 10px 10px 14px'}">
            <button class="logmain" data-ex="${ex}">
              <b>${ex}</b><div class="sub">${meta}${mine?` · yours · ${eq.toLowerCase()}`:''}</div>
            </button>
            <span class="pr-cell">
              <span class="pr-top">${p.mw?wDisp(p.mw)+U():''}</span>
              ${side?`<span class="pr-side">${side}</span>`:''}
            </span>
            ${(mine&&!last)?`<button class="xbtn" data-delex="${ex}" aria-label="Delete ${ex}">✕</button>`:''}
          </div>`;
    };
    const goto=list.filter(x=>x.tier==='goto').sort((a,b)=>b.freq-a.freq||(b.last||'').localeCompare(a.last||''));
    const some=list.filter(x=>x.tier==='sometimes').sort((a,b)=>(b.last||'').localeCompare(a.last||''));
    const fresh=list.filter(x=>x.tier==='new');
    if(goto.length){
      h+=`<h2>${lift.part} · go-to</h2>`;
      goto.forEach(x=>h+=row(x,true));
    }
    if(some.length){
      h+=`<h2 class="quiet">Sometimes</h2>`;
      some.forEach(x=>h+=row(x,false));
    }
    if(fresh.length){
      h+=`<h2 class="quiet">Never tried</h2>`;
      fresh.forEach(x=>h+=row(x,false));
    }
    if(lift.adding){
      h+=`<h2>Add an exercise to ${lift.part}</h2>
          <div class="card">
            <div class="fld text" style="margin-bottom:10px"><label>Name</label>
              <input id="newExName" type="text" placeholder="e.g. Incline Machine Press"></div>
            <label class="mono muted" style="font-size:10px;letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:6px">Equipment</label>
            <div class="chips">${Object.entries(EQUIP_LABEL).map(([k,v])=>
              `<button class="chip ${(lift.newEquip||'barbell')===k?'on':''}" data-newequip="${k}">${v}</button>`).join('')}</div>
            <div class="note">Barbell and Smith get the bar + per-side plate math. Dumbbell shows "per hand". Bodyweight logs added weight only.</div>
            <div class="row" style="gap:8px;margin-top:10px">
              <button class="btn" id="saveEx" style="margin:0">Add to ${lift.part}</button>
              <button class="btn ghost" id="cancelEx" style="margin:0;flex:0 0 96px">Cancel</button>
            </div>
          </div>`;
    }else{
      h+=`<button class="btn ghost" id="addEx" style="margin-top:14px">+ Add your own exercise</button>`;
    }
    $('#view').innerHTML=h; return;
  }

  const ex=lift.ex,isRun=ex==='Run';

  // ---- Copy Picker: two modes — copy the SUGGESTION, or move TODAY's sets
  if(lift.copy){
    const moving = lift.copy.mode==='today';
    const sets = lift.copy.sets;                 // frozen when the picker opened — what you see is what copies
    const srcDate = lift.copy.d;
    let h=`<button class="back" data-cancelcopy="1">← ${ex}</button>
           <div class="exhead">${moving?`Move today's ${sets.length} sets to…`:`Suggest these ${sets.length} sets for…`}</div>
           <div class="note" style="margin-bottom:12px">
             ${sets.map(s=>`${wDisp(s.w)}${U()}×${s.r}`).join('  ')}<br>
             ${moving
               ? `These are logged under ${ex} today. Picking a lift moves them there and removes them from ${ex}.`
               : `Nothing gets logged. The lift you pick will show these as its suggested session — tap or Log-all there when you actually do them.`}
           </div>`;
    const parts=[lift.part,...Object.keys(SEED.catalog).filter(p=>p!==lift.part&&p!=='Run')];
    parts.forEach(p=>{
      const opts=catFor(p).filter(e=>e!==ex&&e!=='Run');
      if(!opts.length) return;
      h+=`<h2>${p}</h2>`;
      opts.forEach(e2=>{
        const last=exLastFor(e2);
        h+=`<button class="item ${last?'':'dim'}" data-copyto="${e2}" data-copypart="${p}">
              <span><b>${e2}</b><div class="sub">${last?(daysAgo(last)===0?'today':daysAgo(last)+'d ago'):'never logged'}</div></span>
              <span class="mono muted" style="font-size:12px">copy →</span>
            </button>`;
      });
    });
    $('#view').innerHTML=h; return;
  }

  const todaySets=t.w.filter(s=>s.ex===ex);
  const l=lastFor(ex),p=prFor(ex);
  let h=`<button class="back">← ${lift.part}</button><div class="exhead">${ex}</div>`;

  let prFoot='';
  if(!isRun&&p.mw){
    prFoot=`<div class="prline" style="margin-top:26px"><span class="lbl">Heaviest:</span> <b>${wLabel(ex,p.mw)}${isBody(ex)&&p.mw<=0.01?'':' '+U()} × ${p.mwr}</b> <span class="ago">(${agoStr(p.mwd)})</span></div>`;
    if(p.bv) prFoot+=`<div class="prline"><span class="lbl">Best set:</span> <b>${wDisp(p.bvw)} ${U()} × ${p.bvr} = ${vDisp(p.bv)} ${U()}</b> <span class="ago">(${agoStr(p.bvd)})</span></div>`;
  }

  // ---- suggested sets: shortcut keys, not a to-do list. Tap = log that w×r
  //      (again and again, if you like). ✕ dismisses one for today. Max 6 shown.
  //      Your LATEST logged set always leads — one tap duplicates it.
  //      Rendered BELOW "Log a set" (v2.10); built here because the log zone
  //      needs `ls` for its default weight.
  const ls=suggestedFor(ex);
  let sugHTML='';
  {
    const when=ls?(daysAgo(ls.d)===1?'yesterday':`${daysAgo(ls.d)}d ago`):'';
    const dis=new Set(dayMeta().sugX[ex]||[]);
    const lastToday=(!isRun&&todaySets.length)?todaySets[todaySets.length-1]:null;
    let pool=[];
    if(lastToday&&lastToday.reps.length)
      pool.push({w:lastToday.w,r:lastToday.reps[0],key:`now|${lastToday.w}|${lastToday.reps[0]}`,now:true});
    (ls?ls.sets:[]).forEach((s,i)=>pool.push({w:s.w,r:s.r,key:`${s.w}|${s.r}|${i}`}));
    const seenWR=new Set();
    pool=pool.filter(c=>{const k=`${c.w}x${c.r}`;if(seenWR.has(k))return false;seenWR.add(k);return true;});
    const chips=pool.filter(c=>!dis.has(c.key)).slice(0,6);
    if(chips.length){
      const mini=todaySets.length>0;
      const lastLine=ls?`Last session — ${wd(ls.d)}: ${ls.sets.map(s=>`${isBody(ex)&&s.w<=0.01?'BW':wDisp(s.w)}×${s.r}`).join(' · ')}`:'';
      sugHTML+=`<div class="zone ${mini?'mini':''}">
          <div class="zonehead">
            <span style="position:relative">Suggested
              <button class="ibtn" id="infoBtn" aria-label="What is this?">i</button>
              ${lift.info?`<span class="tipbubble">${ls
                ?(ls.from?`Carried over from ${ls.from} (${wd(ls.d)}).`:`From your last ${ex} session — ${when}.`)
                :`Your latest set, ready to repeat.`}
                Shortcuts — tap to log that set, ✕ to dismiss.
                ${lastLine?`<span class="tipline">${lastLine}</span>`:''}</span>`:''}
            </span>
          </div>
          <div class="lastsets">`;
      chips.forEach(c=>{
        sugHTML+=`<span class="lschip">
              <button class="lastset ${c.now?'now':''}" data-rep-w="${c.w}" data-rep-r="${c.r}">
                <span class="ls-w">${isBody(ex)&&c.w<=0.01?'BW':`${wDisp(c.w)}<small>${U()}</small>`}</span>
                <span class="ls-x">×</span>
                <span class="ls-r">${c.r}</span></button>
              <button class="lsx" data-sugx="${c.key}" aria-label="Dismiss">✕</button>
            </span>`;
      });
      sugHTML+=`</div>`;
      if(!mini) sugHTML+=`<div class="row" style="gap:8px;margin-top:10px">
            <button class="btn ghost" id="repeatAll" style="margin:0">Log all ${chips.length}</button>
            <button class="btn ghost" id="copySets" style="margin:0">Copy suggestion →</button>
          </div>`;
      sugHTML+=`</div>`;
    }
  }

  if(isRun){
    h+=`<div class="zone prime"><div class="zonehead"><span>Log a run</span></div>
        <div class="runrow" style="margin:10px 0">
          <div class="fld"><label>Distance ${DU()}</label><input id="rk" type="number" inputmode="decimal" step="0.01" placeholder="0.00"></div>
          <div class="fld"><label>Min</label><input id="rm" type="number" inputmode="numeric" placeholder="0"></div>
          <div class="fld"><label>Sec</label><input id="rs" type="number" inputmode="numeric" placeholder="0"></div>
        </div><button class="btn" id="addrun">Add run</button></div>`;
  }else{
    if(lift.weight===0||lift.weight==null){
      const savedW=(DB.settings.exW||{})[ex];
      if(savedW!=null) lift.weight=savedW;                     // your default, exactly as you set it
      else if(isBody(ex)) lift.weight=0;                       // free-weight moves start at bodyweight
      else{
        const top=ls&&ls.sets.length?Math.max(...ls.sets.map(s=>s.w)):null;
        lift.weight=top!=null?snapW(top):toKg(isLb()?45:20);   // inferred weights snap to clean steps
      }
    }
    h+=`<div class="zone prime"><div class="zonehead"><span>Log a set</span></div>
        <div class="wsel" style="margin-top:10px"><button data-w="-1">−</button>
        <div class="val"><input id="wv" type="number" inputmode="decimal" step="${STEP()}" value="${wDisp(lift.weight)}"><span class="unit">${U()}</span></div>
        <button data-w="1">+</button></div>`;
    if(usesPlates(ex)){
      h+=`<div class="loadline" id="ll">${loadInner(ex,lift.weight)}</div>`;
    }else if(loadLine(ex,lift.weight)){
      h+=`<div class="loadline" id="ll"><span class="ll-text">${loadLine(ex,lift.weight)}</span></div>`;
    }
    // rep buttons drawn from what you actually do for THIS exercise
    const reps=repChoices(ex);
    h+=`<div class="repgrid">${reps.map(r=>`<button data-rep="${r}">${r}</button>`).join('')}</div>
        <div class="repcustom">
          <input id="rc" type="number" inputmode="numeric" placeholder="reps">
          <button class="btn" id="addrep" style="margin:0;flex:0 0 96px">Add set</button>
        </div></div>`;
  }

  h+=sugHTML;

  if(todaySets.length){
    h+=`<div class="zone"><div class="zonehead"><span>Logged today · <b class="hi">${todaySets.length}</b> sets</span></div>`;
  }
  h+=`<div class="sets">`;
  todaySets.forEach((s,ti)=>{
    const idx=t.w.indexOf(s);
    const isPR=!isRun&&s.reps.length&&s.w>=p.mw;
    const fresh=lift.justSaved&&ti===todaySets.length-1;
    const anim=fresh?(isPR?' savedpr':' saved'):'';
    h+=isRun
      ?`<div class="settile${anim}${lift.editSet===idx?' editing':''}" data-del="${idx}"><span class="w">${dDisp(s.w)} ${DU()}</span><span class="x">${s.mins||0}'${String(s.secs||0).padStart(2,'0')}"</span></div>`
      :`<div class="settile ${isPR?'pr':''}${anim}${lift.editSet===idx?' editing':''}" data-del="${idx}"><span class="w">${wLabel(ex,s.w)}</span><span class="x">${isBody(ex)&&s.w<=0.01?'×':U()+' ×'}</span><span class="w">${s.reps[0]}</span></div>`;
  });
